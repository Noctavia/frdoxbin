.search-input:focus { border-color: #444; }
.search-input::placeholder { color: #444; }
.search-btn { background: var(--bg4); color: #fff; border: 1px solid var(--border2); padding: 5px 14px; height: 32px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 700; letter-spacing: 1px; }
.search-btn:hover { background: var(--bg5); }
.pagination { display: flex; justify-content: center; margin: 8px 0; }

.showing { color: var(--text3); font-size: 12px; text-align: center; margin: 6px 0; font-family: 'Share Tech Mono', monospace; }
.section { margin: 10px 0; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: var(--bg3); padding: 7px 9px; text-align: left; font-weight: 700; color: var(--text2); border-bottom: 1px solid var(--border2); font-size: 11px; letter-spacing: .5px; text-transform: uppercase; }
thead th:not(:first-child) { text-align: center; }
tbody td { padding: 7px 9px; border-bottom: 1px solid var(--border); color: var(--text); }

.pinned-table tbody tr { background: #0a0808; }
.main-table tbody tr:nth-child(odd) { background: var(--bg3); }
.main-table tbody tr:nth-child(even) { background: #090909; }
tbody tr:hover { filter: brightness(1.25); }
.paste-link, .user-link { cursor: pointer; }
.paste-link:hover, .user-link:hover { text-decoration: underline; }
.form-group { margin-bottom: 12px; }
.form-label { color: var(--text2); font-size: 11px; margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: .5px; font-weight: 700; }

input[type=text]:focus, input[type=password]:focus, select:focus, textarea:focus { border-color: #555; }
textarea { resize: vertical; min-height: 140px; }
select option { background: var(--bg3); }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 7px 16px; font-size: 13px; font-family: inherit; cursor: pointer; transition: background .15s; font-weight: 700; letter-spacing: .5px; }
.btn:hover { background: var(--bg4); }
.btn-red { background: #1a0000; border-color: #550000; color: #ff5555; }

.btn-primary { background: #0d1a2a; border-color: #1a3a5a; color: #5599ff; }
.btn-primary:hover { background: #122036; }
.btn-sm { padding: 3px 10px; font-size: 12px; }
.btn-gold { background: #1a1200; border-color: #5a4400; color: var(--gold); }
.btn-gold:hover { background: #221800; }
.btn-purple { background: #160020; border-color: #440060; color: #cc66ff; }
.btn-purple:hover { background: #1e0030; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: var(--bg2); border: 1px solid var(--border2); padding: 24px; width: 90%; max-width: 560px; max-height: 92vh; overflow-y: auto; }
.modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 18px; color: #fff; letter-spacing: 1px; }
.modal-close { float: right; cursor: pointer; color: var(--text2); font-size: 22px; line-height: 1; }
.modal-close:hover { color: #fff; }
.modal-footer { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.paste-view { background: var(--bg2); border: 1px solid var(--border); }

function setSession(u) { u?localStorage.setItem(SK,JSON.stringify(u)):localStorage.removeItem(SK); }
function getToken() { try { const r=localStorage.getItem('doxbin_token'); return r||null; } catch(e){return null;} }
function setToken(tk) { tk?localStorage.setItem('doxbin_token',tk):localStorage.removeItem('doxbin_token'); }

// ─── HTTP HELPERS ─────────────────────────────────────────────────────────────
async function pbFetch(url, options={}, retries=2) {
  const controller = new AbortController();
  const tid = setTimeout(()=>controller.abort(), 10000);
  try {
    const res = await fetch(url, { ...options, signal: controller.signal });
    clearTimeout(tid);
    if(res.status === 204) return { ok:true, data:{} };
    const data = await res.json().catch(()=>({}));
    return { ok: res.ok, status: res.status, data };
  } catch(e) {
    clearTimeout(tid);
    if(retries > 0 && e.name !== 'AbortError') {
      await new Promise(r=>setTimeout(r, 600));
      return pbFetch(url, options, retries-1);
    }
    const msg = e.name === 'AbortError' ? 'Timeout réseau' : 'Erreur réseau';
    throw new Error(msg);
  }
}

async function pbGet(path, params={}) {
  const clean = {};
  for(const [k,v] of Object.entries(params)) if(v!==''&&v!==null&&v!==undefined) clean[k]=v;
  const q = new URLSearchParams(clean).toString();
  const url = PB_URL + path + (q ? '?'+q : '');
  const headers = {};
  const tok = getToken();
  if(tok) headers['Authorization'] = tok;
  const r = await pbFetch(url, { headers });
  return r.data;
}
async function pbPost(path, body) {
  const tok = getToken();
  const headers = { 'Content-Type':'application/json' };
  if(tok) headers['Authorization'] = tok;
  return pbFetch(PB_URL + path, { method:'POST', headers, body:JSON.stringify(body) });
}
async function pbPatch(path, body) {
  const tok = getToken();
  const headers = { 'Content-Type':'application/json' };
  if(tok) headers['Authorization'] = tok;
  return pbFetch(PB_URL + path, { method:'PATCH', headers, body:JSON.stringify(body) });
}
async function pbDelete(path) {
  const tok = getToken();
  const headers = {};
  if(tok) headers['Authorization'] = tok;
  const r = await pbFetch(PB_URL + path, { method:'DELETE', headers });
  return r.ok;
}

// ─── LOADING OVERLAY ──────────────────────────────────────────────────────────
let _loadCount = 0;
function showLoading() {
  _loadCount++;
  let el = document.getElementById('pb-loading');
  if(!el){
    el=document.createElement('div'); el.id='pb-loading';
    el.style.cssText='position:fixed;bottom:60px;right:20px;background:rgba(0,0,0,.7);border:1px solid #2a2a2a;padding:6px 14px;z-index:9998;font-family:monospace;color:#00ff41;font-size:12px;pointer-events:none;';
    el.textContent='● chargement...';
    document.body.appendChild(el);
  }
}
function hideLoading() {
  _loadCount = Math.max(0, _loadCount-1);
  if(_loadCount === 0) { const el=document.getElementById('pb-loading'); if(el)el.remove(); }
}

// ─── ASYNC WRAPPER ────────────────────────────────────────────────────────────
function run(fn) {
  showLoading();
  Promise.resolve().then(fn).catch(e=>{
    console.error(e);
    const msg = e?.message||'';
    toast(msg.includes('réseau')||msg.includes('network')||msg.includes('fetch')||msg.includes('Timeout')
      ? '⚠ Erreur réseau — vérifiez que PocketBase tourne' : 'Erreur: '+msg, false);
  }).finally(()=>{ hideLoading(); });
}

const OWNER_EMAIL = 'vearathenicofrance@gmail.com';

async function apiLogin(identity, password) {
  const r = await pbPost('/api/collections/users/auth-with-password', { identity, password });
  if(!r.ok) return { success:false, error: r.data?.message||'Email ou mot de passe incorrect' };
  const u = r.data.record;
  if(u.banned) { setToken(null); return { success:false, error:'Compte banni' }; }
  setToken(r.data.token);
  const isOwner = u.email === OWNER_EMAIL;
  if(isOwner && u.role !== 'admin') {
    await pbPatch('/api/collections/users/records/'+u.id, { role:'admin', rank:'admin', badge:'[Admin]', color:'#ff2222', premium:true });
    u.role='admin'; u.rank='admin'; u.badge='[Admin]'; u.color='#ff2222'; u.premium=true;
  }
  const s = { id:u.id, username:u.username, email:u.email, role:u.role||'user', rank:u.rank||'user', premium:u.premium||false, color:u.color||'#2A9FD6' };
  setSession(s);
  S_fullUser = u;
  return { success:true, user:s };
}

async function apiRegister(username, email, password) {
  if(!username||!email||!password||username.length<3||password.length<6) return { success:false, error:'Username min 3 chars, mot de passe min 6 chars' };
  if(!/^[a-zA-Z0-9_]+$/.test(username)) return { success:false, error:'Username: lettres, chiffres, _ seulement' };
  const r = await pbPost('/api/collections/users/records', {
    username, email, password, passwordConfirm: password,
    role:'user', rank:'user', color:'#2A9FD6', badge:'', row_color:'', particle:'none',
    bio:'', discord:'', twitter:'', instagram:'', github:'', website:'',
    avatar_url:'', premium:false, banned:false
  });
  if(!r.ok) return { success:false, error: r.data.message||'Erreur lors de la création du compte' };
  return apiLogin(email, password);
}

async function apiGetPastes(page=1, search='') {
  const limit = 20;
  let filter = "visibility='public'";
  if(search) filter += ` && title~'${search.replace(/'/g,"''")}'`;
  try {
    const data = await pbGet('/api/collections/pastes/records', {
      filter, sort:'-pinned,-created', page, perPage:limit, expand:'author'
    });
    if(!data.items) return { pastes:[], total:0, pages:1 };
    const pastes = data.items.map(p => {
      const au = p.expand?.author;
      return {
        id:p.id, link:p.link||p.id, title:p.title||'Untitled', content:p.content||'',
        views:p.views||0, pinned:p.pinned||false, visibility:p.visibility||'public',
        created_at:p.created, author_id:p.author,
        username:au?.username||null, color:au?.color||'#2A9FD6',
        badge:au?.badge||'', row_color:au?.row_color||'',
        rank:au?.rank||'user', particle:au?.particle||'none',
        comment_count:0, liked_by:[]
      };
    });
    return { pastes, total:data.totalItems||0, pages:data.totalPages||1 };
  } catch(e) {
    console.warn('apiGetPastes error:', e.message);
    return { pastes:[], total:0, pages:1 };
  }
}

async function apiGetPaste(link) {
  try {
    const data = await pbGet('/api/collections/pastes/records', {
      filter:`link='${link}'`, expand:'author', perPage:1
    });
    if(!data.items||!data.items.length) return null;
    const p = data.items[0];
    const au = p.expand?.author;
    pbPatch('/api/collections/pastes/records/'+p.id, { views: (p.views||0)+1 }).catch(()=>{});
    const cdata = await pbGet('/api/collections/comments/records', {
      filter:`paste='${p.id}'`, sort:'created', expand:'author', perPage:200
    });
    const comments = (cdata.items||[]).map(c => {
      const cu = c.expand?.author;
      return { id:c.id, paste_id:p.id, content:c.content, created_at:c.created,
        username:cu?.username||'Anonymous', color:cu?.color||'#777',
        badge:cu?.badge||'', rank:cu?.rank||'user', author_id:c.author };
    });
    const ldata = await pbGet('/api/collections/likes/records', {
      filter:`paste='${p.id}'`, perPage:500
    });
    const liked_by = (ldata.items||[]).map(l=>l.user);
    return {
      id:p.id, link:p.link||link, title:p.title||'Untitled', content:p.content||'',
      views:(p.views||0)+1, pinned:p.pinned||false, visibility:p.visibility||'public',
      created_at:p.created, author_id:p.author,
      username:au?.username||null, color:au?.color||'#2A9FD6',
      badge:au?.badge||'', rank:au?.rank||'user', premium:au?.premium||false,
      bar_color:au?.bar_color||'', particle:au?.particle||'none',
      // FIX 1: avatar_url was missing from return — author avatar never showed in sidebar
      avatar_url:au?.avatar_url||'',
      comments, liked_by
    };
  } catch(e) {
    console.warn('apiGetPaste error:', e.message);
    return null;
  }
}

async function apiGetUser(username) {
  const data = await pbGet('/api/collections/users/records', {
    filter:`username='${username}'`, perPage:1
  });
  if(!data.items||!data.items.length) return null;
  const u = data.items[0];
  const pdata = await pbGet('/api/collections/pastes/records', {
    filter:`author='${u.id}' && visibility!='private'`, sort:'-created', perPage:200
  });
  const pastes = (pdata.items||[]).map(p=>({
    ...p, id:p.id, link:p.link, title:p.title, content:p.content,
    views:p.views||0, created_at:p.created, comment_count:0
  }));
  const fdata = await pbGet('/api/collections/users/records', {
    filter:`following~'${u.id}'`, perPage:1
  });
  const followers = fdata.totalItems||0;
  let likes_received = 0;
  if(pastes.length) {
    const pasteIds = pastes.map(p=>`paste='${p.id}'`).join('||');
    const ldata = await pbGet('/api/collections/likes/records', {
      filter: pasteIds, perPage:1
    });
    likes_received = ldata.totalItems||0;
  }
  const profile_comments = apiGetProfileComments(u.id);
  return {
    ...u, id:u.id, username:u.username, role:u.role||'user', rank:u.rank||'user',
    color:u.color||'#2A9FD6', badge:u.badge||'', bio:u.bio||'',
    discord:u.discord||'', twitter:u.twitter||'', instagram:u.instagram||'',
    github:u.github||'', website:u.website||'', avatar_url:u.avatar_url||'',
    premium:u.premium||false, banned:u.banned||false, bar_color:u.bar_color||'',
    particle:u.particle||'none', created_at:u.created,
    pastes, followers, following:(u.following||[]).length,
    likes_received, liked_pastes:[], profile_comments
  };
}

async function apiCreatePaste(title, content, visibility) {
  if(!title||!content) return { success:false, error:'Titre et contenu requis' };
  const s = getSession();
  if(!s) return { success:false, error:'Connexion requise' };
  const slug = (title.replace(/[^a-zA-Z0-9]/g,'')||'paste').substring(0,25);
  const link = slug+'_'+Date.now().toString(36);
  const r = await pbPost('/api/collections/pastes/records', {
    title, content, link, visibility, author:s.id, views:0, pinned:false, tags:[]
  });
  if(!r.ok) return { success:false, error: r.data.message||'Erreur' };
  return { success:true, link };
}

async function apiAddComment(pasteId, content) {
  if(!content||!content.trim()) return { success:false, error:'Commentaire vide' };
  const s = getSession();
  if(!s) return { success:false, error:'Connexion requise' };
  const r = await pbPost('/api/collections/comments/records', { paste:pasteId, author:s.id, content:content.trim() });
  if(!r.ok) return { success:false, error:'Erreur' };
  return { success:true };
}

async function apiToggleLike(pasteId) {
  const s = getSession();
  if(!s) return;
  const data = await pbGet('/api/collections/likes/records', { filter:`paste='${pasteId}' && user='${s.id}'`, perPage:1 });
  if(data.items&&data.items.length) {
    await pbDelete('/api/collections/likes/records/'+data.items[0].id);
  } else {
    await pbPost('/api/collections/likes/records', { paste:pasteId, user:s.id });
  }
}

async function apiUpdateProfile(body) {
  const s = getSession();
  if(!s) return false;
  const r = await pbPatch('/api/collections/users/records/'+s.id, body);
  if(r.ok) {
    const u = r.data;
    const ns = { ...s, username:u.username, role:u.role||s.role, rank:u.rank||s.rank, premium:u.premium||false };
    setSession(ns); S.user = ns;
    // FIX 2: also update S_fullUser so following/settings stay in sync
    if(S_fullUser) Object.assign(S_fullUser, u);
  }
  return r.ok;
}

async function apiFollow(targetId) {
  const s = getSession();
  if(!s) return false;
  const me = await pbGet('/api/collections/users/records/'+s.id);
  const following = me.following||[];
  const fi = following.indexOf(targetId);
  if(fi===-1) following.push(targetId); else following.splice(fi,1);
  await pbPatch('/api/collections/users/records/'+s.id, { following });
  // FIX 3: update S_fullUser.following so amIFollowing stays accurate
  if(S_fullUser) S_fullUser.following = following;
  return fi===-1;
}

      users:users.totalItems||0, pastes:pastes.totalItems||0,
      comments:comments.totalItems||0, banned:banned.totalItems||0, views
    };
  } catch(e) { return { users:0, pastes:0, comments:0, banned:0, views:0 }; }
}

  const el=document.createElement('div'); el.className='toast';
  el.style.borderColor=ok?'#1a5a1a':'#5a1a1a'; el.style.color=ok?'#55ff55':'#ff5555';
  el.textContent=msg; document.body.appendChild(el); setTimeout(()=>el.remove(),3000);

function timeAgo(d){
  const diff=(Date.now()-new Date(d).getTime())/1000;
  if(diff<60)return'just now'; if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

        ?`<span style="color:${getUserColor(S.user.id)};font-size:13px;cursor:pointer;font-weight:700" onclick="viewUserProfile('${esc(S.user.username)}')">${esc(S.user.username)}</span><a onclick="run(async()=>{await loadFullUser();navigate('settings');})">${t('settings')}</a><a onclick="doLogout()">${t('logout')}</a>`
        :`<a onclick="navigate('auth')">${t('login')}</a><a onclick="navigate('auth')">${t('register')}</a>`}
    </div>
  </nav>`;
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function buildHome(){
  const pinned=S.pastes.filter(p=>p.pinned), regular=S.pastes.filter(p=>!p.pinned);
  const row=p=>{
    const bg=p.row_color?`style="background:${p.row_color}"`:''
    const nc=p.color||rankColor(p.rank);
    const anim=p.particle&&p.particle!=='none'?uanimClass(p.particle):rankAnim(p.rank);
    const au=p.username?`<span class="user-link" data-particle="${anim}" style="color:${nc};font-weight:700;position:relative;display:inline-block" onclick="viewUserProfile('${esc(p.username)}')">${esc(p.username)}${p.badge?` <span style="font-size:11px;opacity:.8">${esc(p.badge)}</span>`:''}</span>`:'<span style="color:#444">Anonymous</span>';
    const cmt=p.comment_count>0?`<span style="color:#555;font-size:11px;margin-left:6px">&#128172;${p.comment_count}</span>`:'';
    return`<tr ${bg}><td><span class="paste-link" onclick="viewPaste('${esc(p.link)}')">${esc(p.title)}${cmt}</span></td><td>${p.views}</td><td>${au}</td><td>${timeAgo(p.created_at)}</td></tr>`;
  };
  const pages=()=>{
    let h=`<button onclick="changePage(Math.max(1,${S.currentPage}-1))">&lt;</button>`;
    for(let i=Math.max(1,S.currentPage-2);i<=Math.min(S.pages,S.currentPage+2);i++)
      h+=`<button class="${i===S.currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
    h+=`<button onclick="changePage(Math.min(${S.pages},${S.currentPage}+1))">&gt;</button>`;
    return h;
  };
  return`
  <div class="search-area">
    <span class="search-label">Search for a paste</span>
    <div class="search-row">
      <input class="search-input" id="searchBox" type="text" placeholder="Search..." value="${esc(S.search)}">
      <button class="search-btn" onclick="doSearch()">Search</button>
    </div>
  </div>
  <div class="showing">Showing ${S.pastes.length} of ${S.total} pastes</div>
  <div class="pagination">${pages()}</div>
  <div class="container">
    ${pinned.length?`<div class="section"><h2>Pinned</h2><table class="pinned-table"><thead><tr><th>Title</th><th>Views</th><th>Author</th><th>Added</th></tr></thead><tbody>${pinned.map(row).join('')}</tbody></table></div>`:''}
    <div class="section">
      <table class="main-table">
        <thead><tr><th>Title</th><th>Views</th><th>Author</th><th>Added</th></tr></thead>
        <tbody>${regular.length?regular.map(row).join(''):'<tr><td colspan="4" style="text-align:center;color:#333;padding:30px;font-family:monospace">No pastes found</td></tr>'}</tbody>
      </table>
    </div>
  </div>
  <div class="pagination">${pages()}</div>
  <div class="showing" style="margin-bottom:20px">Showing ${S.pastes.length} of ${S.total} pastes</div>
  <div class="footer">FRDoxBin &mdash; 2026 &mdash; Please note that all posted information is publicly available</div>`;
}

// ── UPLOAD ────────────────────────────────────────────────────────────────────
function buildUpload(){
  if(!S.user)return`<div class="auth-page"><div class="auth-box"><h2>Login Required</h2><p style="color:#666;margin-bottom:16px;font-size:13px">You must be logged in to paste.</p><button class="btn btn-primary" onclick="navigate('auth')">Login / Register</button></div></div>`;
  return`<div class="container" style="max-width:860px"><div style="padding:20px 0">
    <h2 style="font-size:13px;font-weight:700;margin-bottom:16px;color:#fff;letter-spacing:1px;text-transform:uppercase">New Paste</h2>
    <div class="form-group"><label class="form-label">Title</label><input type="text" id="pasteTitle" placeholder="Untitled"></div>
    <div class="form-group"><label class="form-label">Content</label><textarea id="pasteContent" placeholder="Paste your text here..." style="min-height:260px"></textarea></div>
    <div class="grid2"><div class="form-group"><label class="form-label">Visibility</label><select id="pasteVisibility"><option value="public">Public</option><option value="unlisted">Unlisted</option><option value="private">Private</option></select></div></div>
    <div id="uploadError" class="error-msg" style="display:none"></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn" onclick="navigate('home')">Cancel</button>

  </div></div>`;
}

// ── VIEW PASTE ────────────────────────────────────────────────────────────────
function buildView(){
  const p=S.viewPaste;
  if(!p)return'<div style="padding:40px 20px;color:#333;font-family:monospace">Paste not found.</div>';
  const nc=p.color||rankColor(p.rank);
  const au=p.username
    ?`<a style="color:${nc};cursor:pointer;font-weight:700" onclick="viewUserProfile('${esc(p.username)}')">${esc(p.username)}${p.badge?' <span style="font-size:11px;opacity:.8">'+esc(p.badge)+'</span>':''}</a>`
    :'<span style="color:#555">Anonymous</span>';
  const canDel=S.user?.role==='admin'||S.user?.id===p.author_id;
  const liked=(p.liked_by||[]).includes(S.user?.id);
  const likeCount=(p.liked_by||[]).length;
  const barColor=p.premium&&p.bar_color?p.bar_color:null;
  function hexToRgb(hex){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`;}catch(e){return'180,60,60';}}
  const barRgb=barColor?hexToRgb(barColor):null;
  const hasAuthor=!!p.username;
  const isMyPaste=S.user&&S.user.id===p.author_id;

  // FIX 4: paste comments — ids are PocketBase strings, must be quoted in onclick
  const comments=(p.comments||[]).map(c=>{
    const cc=c.color||rankColor(c.rank);
    const canDelC=S.user?.role==='admin'||S.user?.id===c.author_id;
    return`<div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
        <span style="color:${cc};cursor:pointer;font-weight:700;font-size:13px" onclick="viewUserProfile('${esc(c.username)}')">${esc(c.username)}${c.badge?` <span style="font-size:11px;opacity:.7">${esc(c.badge)}</span>`:''}</span>
        <span style="color:var(--text3);font-size:11px;font-family:monospace">${timeAgo(c.created_at)}</span>
        ${canDelC?`<span style="color:var(--accent);font-size:11px;cursor:pointer;margin-left:auto;font-family:monospace" onclick="delComment('${c.id}')">delete</span>`:''}
      </div>
      <div style="color:var(--text);font-size:13px;line-height:1.6">${esc(c.content)}</div>
    </div>`;
  }).join('');

  return`
  <div style="display:flex;min-height:calc(100vh - 42px)">
    <div style="flex:1;min-width:0;padding:0;position:relative">
      ${barRgb?`<div style="height:2px;background:linear-gradient(90deg,transparent 0%,rgba(${barRgb},.18) 25%,rgba(${barRgb},.38) 50%,rgba(${barRgb},.18) 75%,transparent 100%);pointer-events:none"></div>`:''}
      <div style="background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between">
        <span style="color:#fff;font-size:14px;font-weight:700">${esc(p.title)}</span>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn btn-sm" onclick="copyPaste()">Copy</button>
          <!-- FIX 5: PocketBase IDs are strings — must use quotes in inline onclick -->
          <span class="like-btn ${liked?'liked':''}" onclick="doLike('${p.id}')">&#9829; ${likeCount}</span>
          ${canDel?`<button class="btn btn-sm btn-red" onclick="deleteCurrentPaste('${p.id}')">Delete</button>`:''}
          <button class="btn btn-sm" onclick="navigate('home')">&larr; Back</button>
        </div>
      </div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:13px;line-height:1.75;color:#c0c0c0;padding:16px 18px;white-space:pre-wrap;word-break:break-all;min-height:60vh">${esc(p.content)}</div>
      <div style="border-top:1px solid var(--border);padding:16px 18px;background:var(--bg2)">
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Comments (${(p.comments||[]).length})</div>
        <!-- FIX 6: submitComment needs quoted string ID -->
        ${S.user
          ?`<div style="margin-bottom:14px"><textarea id="commentText" placeholder="Write a comment..." style="min-height:60px;width:100%;background:var(--bg3);border:1px solid var(--border2);color:#ccc;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;resize:vertical"></textarea><button class="btn btn-sm btn-primary" style="margin-top:6px" onclick="submitComment('${p.id}')">Post Comment</button></div>`
          :`<p style="color:#555;font-size:12px;margin-bottom:12px;font-family:monospace"><a onclick="navigate('auth')" style="cursor:pointer;color:var(--blue)">Login</a> to comment</p>`}
        ${comments||'<p style="color:#444;font-size:12px;font-family:monospace">No comments yet.</p>'}
      </div>
    </div>
    <div style="width:300px;flex-shrink:0;border-left:1px solid var(--border);background:var(--bg2);padding:0">
      <div style="padding:18px 16px;border-bottom:1px solid var(--border);text-align:right">
        <div style="font-size:22px;font-weight:700;letter-spacing:3px;color:#fff;font-family:'Rajdhani',sans-serif;text-shadow:0 0 20px rgba(255,34,34,.3)">FRDoxBin</div>
        ${S.user
          ?`<div style="color:var(--text2);font-size:12px;margin-top:4px"><span style="color:${getUserColor(S.user.id)};cursor:pointer;font-weight:700" onclick="viewUserProfile('${esc(S.user.username)}')">${esc(S.user.username)}</span> &bull; <a onclick="doLogout()" style="cursor:pointer">Logout</a></div>`
          :`<div style="color:var(--text2);font-size:12px;margin-top:4px"><a onclick="navigate('auth')" style="cursor:pointer;color:var(--blue)">Login</a> or <a onclick="navigate('auth')" style="cursor:pointer;color:var(--blue)">Register</a> to manage your pastes.</div>`}
      </div>
      <div style="padding:14px 16px;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Paste Info</div>
        <div style="display:flex;flex-direction:column;gap:7px">
          <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--text3)">Author</span><span>${au}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--text3)">Views</span><span style="color:var(--text2);font-family:monospace">${p.views}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--text3)">Posted</span><span style="color:var(--text2);font-family:monospace">${timeAgo(p.created_at)}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--text3)">Visibility</span><span style="color:var(--text2)">${p.visibility}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--text3)">Likes</span><span style="color:var(--text2);font-family:monospace">${likeCount}</span></div>
        </div>
      </div>
      ${hasAuthor?`
      <div style="padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer" onclick="viewUserProfile('${esc(p.username)}')">
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Author</div>
        <div style="display:flex;align-items:center;gap:10px">
          <!-- FIX 7: avatar_url was missing from apiGetPaste return — now included -->
          <div style="width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:${nc};overflow:hidden;flex-shrink:0">${p.avatar_url?`<img src="${esc(p.avatar_url)}" style="width:100%;height:100%;object-fit:cover">`:esc((p.username||'?')[0].toUpperCase())}</div>
          <div>
            <div style="color:${nc};font-weight:700;font-size:13px">${esc(p.username)} ${p.badge?`<span style="font-size:11px;opacity:.8">${esc(p.badge)}</span>`:''}</div>
            <div style="color:var(--text3);font-size:11px;font-family:monospace">Voir le profil</div>
          </div>
        </div>
      </div>`:''}
      ${isMyPaste&&p.premium?`
      <div style="padding:14px 16px;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Bar Color</div>
        <div id="barPreview" style="height:2px;margin-bottom:8px;background:linear-gradient(90deg,transparent 0%,rgba(180,60,60,.18) 25%,rgba(180,60,60,.38) 50%,rgba(180,60,60,.18) 75%,transparent 100%);transition:background .2s"></div>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="color" id="barColorPick" value="${p.bar_color||'#b43c3c'}" style="width:36px;height:28px;padding:0;border:1px solid var(--border2);background:none;cursor:pointer;flex-shrink:0" oninput="updateBarPreview(this.value)">
          <button class="btn btn-sm btn-gold" onclick="saveBarColor()">Apply</button>
        </div>
        <div style="color:var(--text3);font-size:10px;font-family:monospace;margin-top:6px">Teintes sombres recommandées</div>
      </div>`:''}
      <div style="padding:14px 16px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">New Paste</div>
        ${S.user
          ?`<button class="btn btn-primary" style="width:100%;text-align:center" onclick="navigate('upload')">+ Add Paste</button>`
          :`<button class="btn btn-primary" style="width:100%;text-align:center" onclick="navigate('auth')">Login to paste</button>`}
      </div>
    </div>
  </div>`;
}

// ── PROFILE ───────────────────────────────────────────────────────────────────
function buildProfile(){
  const u=S.viewUser;
  if(!u)return'<div style="padding:40px 20px;color:#333;font-family:monospace">User not found.</div>';
  const isMe=S.user?.id===u.id;
  // FIX 8: S.user session does NOT contain following[] — must use S_fullUser
  const amIFollowing=(()=>{if(!S.user)return false; return (S_fullUser?.following||[]).includes(u.id)||false;})();
  const nc=u.color||rankColor(u.rank);
  const rl=rankLabel(u.rank);
  const anim=u.particle&&u.particle!=='none'?uanimClass(u.particle):rankAnim(u.rank);
  const av=u.avatar_url
    ?`<img src="${esc(u.avatar_url)}" style="width:100%;height:100%;object-fit:cover" alt="">`
    :`<span style="color:${nc};font-size:32px;font-weight:700">${esc((u.username[0]).toUpperCase())}</span>`;

  const profileComments=apiGetProfileComments(u.id).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const pcRows=profileComments.map(c=>{
    // FIX 9: cuColor was hardcoded '#2A9FD6' — look up from allUsers cache
    const cuCached = S.allUsers?.find(x=>x.id===c.author_id);
    const cuColor = cuCached?.color || rankColor(cuCached?.rank||'user');
    const canDelC=S.user?.role==='admin'||S.user?.id===c.author_id||S.user?.id===u.id;
    return`<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:8px 14px;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        <span style="color:${cuColor};font-weight:700;cursor:pointer;font-size:13px" onclick="viewUserProfile('${esc(c.author_username||'')}')">${esc(c.author_username||'?')}</span><span style="color:var(--text3);font-size:13px">: ${esc(c.content)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:12px">
        <span style="color:var(--text3);font-size:11px;font-family:monospace;white-space:nowrap">${timeAgo(c.created_at)}</span>
        ${canDelC?`<span style="color:var(--accent);font-size:11px;cursor:pointer;font-family:monospace" onclick="delProfileComment('${u.id}',${c.id})">del</span>`:''}
      </div>
    </div>`;
  }).join('');

  const pasteRows=(u.pastes||[]).map(p=>`
    <tr>
      <td><span class="paste-link" onclick="viewPaste('${esc(p.link)}')">${esc(p.title)}</span></td>
      <td>${p.comment_count||0}</td>
      <td>${p.views}</td>
      <td style="font-family:monospace;font-size:12px">${new Date(p.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</td>
    </tr>`).join('');

  const pasteCount=(u.pastes||[]).length;
  const likeCount=u.likes_received||0;

  return`
  <div class="profile-page">
    <canvas id="profile-canvas"></canvas>
    <div class="profile-inner" style="max-width:820px;margin:0 auto;padding:24px 16px">
      <div style="background:rgba(14,14,14,.92);border:1px solid var(--border2);margin-bottom:12px;position:relative;overflow:hidden">
        <div style="padding:20px 20px 16px;display:flex;align-items:center;gap:18px">
          <div style="width:72px;height:72px;flex-shrink:0;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;background:var(--bg3);overflow:hidden">${av}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
              <span data-particle="${anim}" style="color:${nc};font-size:18px;font-weight:700;position:relative;display:inline-block">${esc(u.username)}</span>
              ${rl?`<span style="font-size:13px;color:${nc};font-weight:700">${rl}</span>`:''}
              ${u.bio?`<span style="color:var(--text3);font-size:13px">&nbsp;|&nbsp;${esc(u.bio)}</span>`:''}
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--text2);margin-bottom:8px" class="profile-socials">
              ${u.discord?`<a href="https://discord.com/users/${esc(u.discord)}" target="_blank" class="social-link" title="Discord">Dsc&nbsp;${esc(u.discord)}</a>`:''}
              ${u.twitter?`<a href="https://x.com/${esc(u.twitter.replace('@',''))}" target="_blank" class="social-link" title="Twitter / X">X&nbsp;${esc(u.twitter)}</a>`:''}
              ${u.instagram?`<a href="https://instagram.com/${esc(u.instagram.replace('@',''))}" target="_blank" class="social-link" title="Instagram">Ig&nbsp;${esc(u.instagram)}</a>`:''}
              ${u.github?`<a href="https://github.com/${esc(u.github.replace('@',''))}" target="_blank" class="social-link" title="GitHub">Gh&nbsp;${esc(u.github)}</a>`:''}
              ${u.website?`<a href="${esc(u.website)}" target="_blank" rel="noopener noreferrer" class="social-link" title="Website">Web</a>`:''}
            </div>
            <div style="display:flex;gap:20px;font-size:13px">
              <span><strong style="color:#fff">${u.following||0}</strong> <span style="color:var(--text2)">${t('following')}</span></span>
              <span><strong style="color:#fff">${u.followers||0}</strong> <span style="color:var(--text2)">${t('followers')}</span></span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            <!-- FIX 10: doFollow needs quoted string ID -->
            ${!isMe&&S.user?`<button class="btn btn-sm ${amIFollowing?'btn-red':''}" onclick="doFollow('${u.id}')">${amIFollowing?t('unfollow'):t('follow')}</button>`:''}
            ${isMe?`<button class="btn btn-sm" onclick="navigate('settings')">${t('edit_profile')}</button>`:''}
          </div>
        </div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border2);margin-bottom:12px">
        <div style="padding:10px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;color:#fff">Info</div>
        <div style="padding:0">
          ${[
            ['UID', u.id],
            [t('pastes'), pasteCount],
            ['Likes', likeCount],
            ['Created:', new Date(u.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})],

        <!-- FIX 11: submitProfileComment needs quoted string ID -->
        ${S.user&&!isMe?`
          <div style="padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px">
            <input type="text" id="profileCommentText" placeholder="Leave a comment..." style="flex:1;height:32px;background:var(--bg3);border:1px solid var(--border2);color:#ccc;padding:5px 10px;font-size:13px;font-family:inherit;outline:none">

      </div>
    </div>
  </div>`;
}

function uanimClass(particle){ return particle&&particle!=='none'?particle:''; }
function rankAnim(rank){ return{admin:'fire',mod:'matrix',manager:'fire',council:'stars',rich:'stars',criminal:'stars',vip:'stars'}[rank]||''; }

// ── USERS LIST ────────────────────────────────────────────────────────────────
function buildUsers(){
  const allUsers=S.allUsers||[];
  const total=allUsers.length;
  const sv=S.userSearch||'';
  const filtered=sv?allUsers.filter(u=>u.username.toLowerCase().includes(sv.toLowerCase())):allUsers;
  const GROUPS=[
    {key:'admin', label:t('admin_lbl')},
    {key:'manager', label:t('manager_lbl')},
    {key:'mod', label:t('mod_lbl')},
    {key:'council', label:t('council_lbl')},
    {key:'rich', label:t('rich_lbl')},
    {key:'criminal', label:t('criminal_lbl')},
    {key:'vip', label:t('vip_lbl')},
    {key:'user', label:t('user_lbl')},
  ];
  const row=u=>{
    const nc=u.color||rankColor(u.rank);
    const anim=u.particle&&u.particle!=='none'?uanimClass(u.particle):rankAnim(u.rank);
    const pc=u.paste_count!=null?u.paste_count:'—';
    const cc=u.comment_count!=null?u.comment_count:'—';
    const joined=u.created_at?new Date(u.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
    return`<tr>
      <td style="color:var(--text3);font-family:monospace;font-size:12px">${esc(String(u.id||''))}</td>
      <td><span class="user-link" data-particle="${anim}" style="color:${nc};font-weight:700;position:relative;display:inline-block" onclick="viewUserProfile('${esc(u.username)}')">${esc(u.username)}</span></td>
      <td style="font-family:monospace">${pc}</td>
      <td style="font-family:monospace">${cc}</td>
      <td style="font-family:monospace;font-size:12px;color:var(--text2)">${joined}</td>
    </tr>`;
  };
  const sections=GROUPS.map(g=>{
    const members=filtered.filter(u=>u.rank===g.key||(!u.rank&&g.key==='user')).sort((a,b)=>a.id-b.id);
    if(!members.length)return'';
    return`<div style="margin-bottom:24px">
      <div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:.5px">${g.label}</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr>
          <th style="background:var(--bg3);padding:7px 10px;text-align:left;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border2);font-size:11px;text-transform:uppercase;letter-spacing:.5px">ID</th>
          <th style="background:var(--bg3);padding:7px 10px;text-align:left;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border2);font-size:11px;text-transform:uppercase;letter-spacing:.5px">${t('title')}</th>
          <th style="background:var(--bg3);padding:7px 10px;text-align:center;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border2);font-size:11px;text-transform:uppercase;letter-spacing:.5px">${t('pastes')}</th>
          <th style="background:var(--bg3);padding:7px 10px;text-align:center;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border2);font-size:11px;text-transform:uppercase;letter-spacing:.5px">${t('comments_lbl')}</th>
          <th style="background:var(--bg3);padding:7px 10px;text-align:center;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border2);font-size:11px;text-transform:uppercase;letter-spacing:.5px">${t('joined')}</th>
        </tr></thead>
        <tbody>${members.map(row).join('')}</tbody>
      </table>
    </div>`;
  }).join('');
  return`<div class="container" style="max-width:900px">
    <h2 style="font-size:20px;font-weight:700;margin-top:24px;margin-bottom:12px;color:#fff;text-align:center">${t('users_title')}</h2>
    <div style="display:flex;justify-content:center;gap:6px;margin-bottom:8px">
      <input type="text" placeholder="${t('search_users')}" value="${esc(sv)}" oninput="S.userSearch=this.value;render()" style="width:320px;height:34px;background:var(--bg3);border:1px solid var(--border2);color:#ccc;padding:5px 12px;font-size:13px;font-family:inherit;outline:none">
      <button class="btn" onclick="S.userSearch='';render()">&#215;</button>
    </div>
    <div style="text-align:center;color:var(--text3);font-size:12px;font-family:monospace;margin-bottom:20px">${t('showing_users')} ${filtered.length} ${t('of_users')} ${total} ${t('total_users')}</div>
    ${sections||`<p style="color:#444;text-align:center;font-family:monospace;padding:40px">${allUsers.length===0&&!sv?'Chargement...' : 'Aucun utilisateur trouvé.'}</p>`}
  </div>`;
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
const PCONF = {
  stars:  { colors:['#ffffff','#ccddff','#aabbff'], size:[1,2], count:55, vx:[-0.3,0.3], vy:[-0.3,0.3], fade:true,  mode:'drift'  },
  fire:   { colors:['#ff4400','#ff6600','#ff9900','#ffcc00'], size:[1,2], count:50, vx:[-0.4,0.4], vy:[-2,-0.5], fade:true,  mode:'rise'   },
  snow:   { colors:['#cce8ff','#ffffff','#aad4ff'], size:[1,2], count:45, vx:[-0.3,0.3], vy:[0.3,0.9], fade:false, mode:'fall'   },
  matrix: { colors:['#00ff41','#00cc33','#007722'], size:[1,1], count:40, vx:[0,0],       vy:[0.8,2],   fade:false, mode:'matrix' },
};
let particleAnim=null, namePixelAnims=[];
function stopAllParticles(){
  if(particleAnim){cancelAnimationFrame(particleAnim);particleAnim=null;}
  namePixelAnims.forEach(a=>cancelAnimationFrame(a));
  namePixelAnims=[];
}
function spawnParticles(type){
  stopAllParticles();
  const canvas=document.getElementById('profile-canvas');
  if(!canvas||!type||type==='none')return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth||800; canvas.height=canvas.offsetHeight||600;
  const cfg=PCONF[type]||PCONF.stars;
  const ps=[];
  for(let i=0;i<cfg.count;i++) ps.push(mkDot(cfg, canvas.width, canvas.height, type));
  function mkDot(cfg,w,h,type){
    const isMatrix=type==='matrix';
    return{
      x: isMatrix ? Math.floor(Math.random()*(w/8))*8 : Math.random()*w,
      y: type==='fire' ? h+4 : Math.random()*h,
      vx: cfg.vx[0]+(Math.random()*(cfg.vx[1]-cfg.vx[0])),
      vy: cfg.vy[0]+(Math.random()*(cfg.vy[1]-cfg.vy[0])),
      color: cfg.colors[Math.floor(Math.random()*cfg.colors.length)],
      size: cfg.size[0]+Math.floor(Math.random()*(cfg.size[1]-cfg.size[0]+1)),
      alpha: Math.random()*.8+.2,
      life: 1, decay: Math.random()*.015+.005,
      char: isMatrix ? String.fromCharCode(0x30A0+Math.floor(Math.random()*96)) : null,
    };
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=0;i<ps.length;i++){
      const p=ps[i];
      ctx.globalAlpha=Math.max(0,Math.min(1, type==='fire'?p.life*.8:p.alpha));
      if(p.char){
        ctx.fillStyle=p.color; ctx.font='9px monospace'; ctx.fillText(p.char,p.x,p.y);
      } else {
        ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,p.size,p.size);
      }
      p.x+=p.vx; p.y+=p.vy;
      if(type==='fire'){p.life-=p.decay; if(p.life<=0)ps[i]=mkDot(cfg,canvas.width,canvas.height,type);}
      else if(type==='stars'){p.alpha+=(Math.random()-.5)*.04; p.alpha=Math.max(.1,Math.min(1,p.alpha)); if(p.x<0)p.x=canvas.width; if(p.x>canvas.width)p.x=0; if(p.y<0)p.y=canvas.height; if(p.y>canvas.height)p.y=0;}
      else if(type==='snow'){if(p.y>canvas.height){p.y=-2;p.x=Math.random()*canvas.width;}}
      else if(type==='matrix'){if(p.char&&Math.random()<.04)p.char=String.fromCharCode(0x30A0+Math.floor(Math.random()*96)); if(p.y>canvas.height){p.y=0;p.x=Math.floor(Math.random()*(canvas.width/8))*8;}}
    }
    ctx.globalAlpha=1;
    particleAnim=requestAnimationFrame(draw);
  }
  draw();
}
function spawnNameParticles(el, type){
  if(!el||!type||type==='none')return;
  if(el._pixelCanvas)el._pixelCanvas.remove();
  const cfg=PCONF[type];
  if(!cfg)return;
  const c=document.createElement('canvas');
  c.style.cssText='position:absolute;top:-8px;left:-4px;pointer-events:none;z-index:10;';
  el.style.position='relative';
  el.appendChild(c); el._pixelCanvas=c;
  const W=el.offsetWidth+12, H=el.offsetHeight+18;
  c.width=W; c.height=H;
  const ctx=c.getContext('2d');
  const COUNT=Math.min(16, Math.ceil(W/8));
  const ps=[];
  for(let i=0;i<COUNT;i++){
    ps.push({
      x:Math.random()*W, y:H-2,
      vx:(Math.random()-.5)*.6,
      vy:type==='snow'?(Math.random()*.5+.2):-(Math.random()*1.2+.3),
      color:cfg.colors[Math.floor(Math.random()*cfg.colors.length)],
      size:1, alpha:Math.random()*.9+.1,
      life:Math.random(), decay:Math.random()*.025+.008,
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const p of ps){
      ctx.globalAlpha=Math.max(0,p.alpha);
      ctx.fillStyle=p.color;
      ctx.fillRect(Math.round(p.x),Math.round(p.y),1,1);
      p.x+=p.vx; p.y+=p.vy;
      p.life-=p.decay;
      if(p.life<=0){
        p.x=Math.random()*W; p.y=type==='snow'?-1:H-2;
        p.life=Math.random()*.8+.2;
        p.vx=(Math.random()-.5)*.6;
        p.vy=type==='snow'?(Math.random()*.5+.2):-(Math.random()*1.2+.3);
        p.color=cfg.colors[Math.floor(Math.random()*cfg.colors.length)];
      }
    }
    ctx.globalAlpha=1;
    const id=requestAnimationFrame(draw); el._pixelRaf=id; namePixelAnims.push(id);
  }
  draw();
}
function attachNameParticles(){
  document.querySelectorAll('[data-particle]').forEach(el=>{
    const type=el.getAttribute('data-particle');
    spawnNameParticles(el, type);
  });
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function attachEvents(){
  const sb=document.getElementById('searchBox'); if(sb)sb.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
  const lp=document.getElementById('loginPass'); if(lp)lp.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  const rp=document.getElementById('regPass'); if(rp)rp.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
  const pc=document.getElementById('profileCommentText'); if(pc)pc.addEventListener('keydown',e=>{if(e.key==='Enter'&&S.viewUser)submitProfileComment(S.viewUser.id);});
}
function loadPastes(){run(async()=>{const r=await apiGetPastes(S.currentPage,S.search);S.pastes=r.pastes;S.total=r.total;S.pages=r.pages;render();});}
function doSearch(){S.search=document.getElementById('searchBox').value;S.currentPage=1;loadPastes();}
function changePage(p){S.currentPage=p;loadPastes();}
function viewPaste(link){run(async()=>{const paste=await apiGetPaste(link);S.viewPaste=paste;navigate('view');});}
function viewUserProfile(username){run(async()=>{const user=await apiGetUser(username);S.viewUser=user;S.profileTab='pastes';navigate('profile');});}
function submitPaste(){
  run(async()=>{
    const title=document.getElementById('pasteTitle').value.trim();
    const content=document.getElementById('pasteContent').value.trim();
    const visibility=document.getElementById('pasteVisibility').value;
    const r=await apiCreatePaste(title,content,visibility);
    if(r.success){toast('Paste publié!');const paste=await apiGetPaste(r.link);S.viewPaste=paste;navigate('view');}
    else{const e=document.getElementById('uploadError');if(e){e.textContent=r.error;e.style.display='block';}}
  });
}
function submitComment(pasteId){
  run(async()=>{
    const content=document.getElementById('commentText')?.value;
    const r=await apiAddComment(pasteId,content);
    if(r.success){toast('Commentaire posté!');const paste=await apiGetPaste(S.viewPaste.link);S.viewPaste=paste;render();}
    else toast(r.error,false);
  });
}
function delComment(id){if(!confirm('Supprimer ce commentaire?'))return;run(async()=>{await apiDeleteComment(id);toast('Commentaire supprimé.');const paste=await apiGetPaste(S.viewPaste.link);S.viewPaste=paste;render();});}
function submitProfileComment(targetId){
  run(async()=>{
    const v=document.getElementById('profileCommentText')?.value;
    const r=apiAddProfileComment(targetId,v);
    if(r.success){toast('Commentaire posté!');const u=await apiGetUser(S.viewUser.username);S.viewUser=u;render();}
    else toast(r.error||'Erreur',false);
  });
}
function delProfileComment(targetId,id){
  if(!confirm('Supprimer?'))return;
  apiDeleteProfileComment(targetId,id);toast('Supprimé.');run(async()=>{const u=await apiGetUser(S.viewUser.username);S.viewUser=u;render();});
}
function doLike(pasteId){if(!S.user){navigate('auth');return;}run(async()=>{await apiToggleLike(pasteId);const paste=await apiGetPaste(S.viewPaste.link);S.viewPaste=paste;render();});}
function doFollow(targetId){if(!S.user){navigate('auth');return;}run(async()=>{const f=await apiFollow(targetId);toast(f?'Abonné!':'Désabonné.');const user=await apiGetUser(S.viewUser.username);S.viewUser=user;render();});}
function doLogin(){
  run(async()=>{
    const identity=document.getElementById('loginUser').value.trim(),password=document.getElementById('loginPass').value;
    if(!identity||!password){const e=document.getElementById('loginError');if(e){e.textContent='Remplissez tous les champs.';e.style.display='block';}return;}
    const r=await apiLogin(identity,password);
    if(r.success){S.user=r.user;toast('Bienvenue, '+r.user.username+'!');navigate('home');loadPastes();}
    else{const e=document.getElementById('loginError');if(e){e.textContent=r.error;e.style.display='block';}}
  });
}
function doRegister(){
  run(async()=>{
    const username=document.getElementById('regUser').value;
    const email=document.getElementById('regEmail').value;
    const password=document.getElementById('regPass').value;
    const r=await apiRegister(username,email,password);
    if(r.success){S.user=r.user;toast('Compte créé!');navigate('home');loadPastes();}
    else{const e=document.getElementById('regError');if(e){e.textContent=r.error;e.style.display='block';}}
  });
}
function doLogout(){setSession(null);setToken(null);S.user=null;S_fullUser=null;navigate('home');toast('Déconnecté.');loadPastes();}
function switchAuthTab(tab){
  document.getElementById('tab-login').className='auth-tab'+(tab==='login'?' active':'');
  document.getElementById('tab-register').className='auth-tab'+(tab==='register'?' active':'');
  document.getElementById('auth-login').style.display=tab==='login'?'':'none';
  document.getElementById('auth-register').style.display=tab==='register'?'':'none';
}
function goAdmin(){run(async()=>{S.adminStats=await apiAdminStats();S.adminUsers=await apiAdminUsers();S.adminPastes=await apiAdminPastes();S.adminTab='dashboard';navigate('admin');});}
function switchAdminTab(tab){
  S.adminTab=tab;
  run(async()=>{
    if(tab==='dashboard')S.adminStats=await apiAdminStats();
    if(tab==='users')S.adminUsers=await apiAdminUsers();
    if(tab==='pastes')S.adminPastes=await apiAdminPastes();
    render();
  });
}
function openEditUser(id){S.modal=S.adminUsers.find(u=>u.id===id);render();}
function openGrantRank(id){const u=S.adminUsers.find(u=>u.id===id);if(u){S.modal={...u,type:'grantRank'};render();}}
function closeModal(e){if(e.target.className==='modal-overlay'){S.modal=null;render();}}
function saveUser(id){
  const body={role:document.getElementById('editRole').value,color:document.getElementById('editColor').value,row_color:document.getElementById('editRowColor').value,badge:document.getElementById('editBadge').value,particle:document.getElementById('editParticle').value,premium:document.getElementById('editPremium').value==='1',banned:document.getElementById('editBanned').checked};
  run(async()=>{if(await apiUpdateUser(id,body)){toast('Utilisateur mis à jour!');S.modal=null;S.adminUsers=await apiAdminUsers();render();}else toast('Erreur',false);});
}
function doGrantRank(id){
  const rank=document.getElementById('grantRankSelect').value,product=document.getElementById('grantProduct').value||rank;
  run(async()=>{if(await apiGrantRank(id,rank,product)){toast('Rang accordé!');S.modal=null;S.adminUsers=await apiAdminUsers();render();}else toast('Erreur',false);});
}
function deleteUser(id,name){if(!confirm(`Supprimer "${name}" et tous ses pastes?`))return;run(async()=>{await apiDeleteUser(id);toast('Utilisateur supprimé.');S.adminUsers=await apiAdminUsers();render();});}
function deletePaste(id){if(!confirm('Supprimer ce paste?'))return;run(async()=>{await apiDeletePaste(id);toast('Paste supprimé.');S.adminPastes=await apiAdminPastes();loadPastes();render();});}
function deleteCurrentPaste(id){if(!confirm('Supprimer ce paste?'))return;run(async()=>{await apiDeletePaste(id);toast('Paste supprimé.');navigate('home');loadPastes();});}
function togglePin(id){run(async()=>{const p=await apiTogglePin(id);toast(p?'Paste épinglé.':'Paste désépinglé.');S.adminPastes=await apiAdminPastes();loadPastes();render();});}
function copyPaste(){if(S.viewPaste)navigator.clipboard.writeText(S.viewPaste.content).then(()=>toast('Copié!'));}
function updateBarPreview(hex){
  if(!hex||hex.length<7)return;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const prev=document.getElementById('barPreview');
  if(prev)prev.style.background=`linear-gradient(90deg,transparent 0%,rgba(${r},${g},${b},.18) 25%,rgba(${r},${g},${b},.38) 50%,rgba(${r},${g},${b},.18) 75%,transparent 100%)`;
}
function saveBarColor(){
  const v=document.getElementById('barColorPick')?.value;
  if(!v)return;
  run(async()=>{if(await apiUpdateProfile({bar_color:v})){toast('Couleur mise à jour!');const paste=await apiGetPaste(S.viewPaste.link);S.viewPaste=paste;render();}});
}
function handleAvatarUpload(e){
  const file=e.target.files[0]; if(!file)return;
  if(file.size>2*1024*1024){toast('Image trop grande (max 2 Mo)',false);return;}
  const r=new FileReader();
  r.onload=ev=>{
    const data=ev.target.result;
    S._pendingAvatar=data;
    const prev=document.getElementById('avatarPreview');
    if(prev)prev.innerHTML=`<img src="${data}" style="width:100%;height:100%;object-fit:cover" alt="">`;
  };
  r.readAsDataURL(file);
}
function clearAvatar(){
  S._pendingAvatar='';
  const prev=document.getElementById('avatarPreview');
  const uname=S_fullUser?.username||S.user?.username||'?';
  if(prev)prev.innerHTML=`<span style="font-size:24px;font-weight:700;color:#fff">${esc(uname[0].toUpperCase())}</span>`;
}
function saveSettings(){
  const body={
    bio:document.getElementById('setBio').value,
    discord:document.getElementById('setDiscord')?.value||'',
    twitter:document.getElementById('setTwitter')?.value||'',
    instagram:document.getElementById('setInstagram')?.value||'',
    github:document.getElementById('setGithub')?.value||'',
    website:document.getElementById('setWebsite')?.value||'',
    color:document.getElementById('setColor')?.value||'#2A9FD6'
  };
  if(S._pendingAvatar!==undefined)body.avatar_url=S._pendingAvatar;
  S._pendingAvatar=undefined;
  run(async()=>{if(await apiUpdateProfile(body)){const m=document.getElementById('settingsMsg');if(m){m.textContent='Profil sauvegardé!';m.style.display='block';setTimeout(()=>{m.style.display='none';},2500);}toast('Profil mis à jour!');}});
}
function saveAdminSettings(){
  const body={site_name:document.getElementById('sSiteName').value,paypal_email:document.getElementById('sPaypal').value,online_count_base:parseInt(document.getElementById('sOnline').value)||340};
  apiAdminSettings(body);toast('Paramètres sauvegardés!');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
if(S.user) loadFullUser();
loadPastes();
</script>
