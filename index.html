// ─── UTILS ────────────────────────────────────────────────────────────────────
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, ok = true) {
  const el = document.createElement('div'); el.className = 'toast';
  el.style.borderColor = ok ? '#1a5a1a' : '#5a1a1a'; el.style.color = ok ? '#55ff55' : '#ff5555';
  el.textContent = msg; document.body.appendChild(el); setTimeout(() => el.remove(), 3000);
}
function timeAgo(d) {
  const diff = (Date.now() - new Date(d).getTime()) / 1000;
  if (diff < 60) return 'just now'; if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function navigate(page, extra = {}) { Object.assign(S, extra, { page }); render(); }
function rankLabel(r) { return { admin:'[Admin]', manager:'[Manager]', mod:'[Mod]', council:'[Council]', vip:'[VIP]', criminal:'[Criminal]', rich:'[Rich]', user:'' }[r] || ''; }
function rankColor(r) { return { admin:'#ff2222', manager:'#ff6644', mod:'#00ff41', council:'#4488ff', vip:'#cc66ff', criminal:'#9944cc', rich:'#ffd700', user:'#777' }[r] || '#777'; }
function rankAnim(r) { return { admin:'fire', mod:'matrix', manager:'fire', council:'stars', rich:'stars', criminal:'stars', vip:'stars' }[r] || ''; }

let _loadCount = 0;
function showLoading() {
  _loadCount++;
  let el = document.getElementById('pb-loading');
  if (!el) { el = document.createElement('div'); el.id = 'pb-loading'; el.style.cssText = 'position:fixed;bottom:60px;right:20px;background:rgba(0,0,0,.7);border:1px solid #2a2a2a;padding:6px 14px;z-index:9998;font-family:monospace;color:#00ff41;font-size:12px;pointer-events:none;'; el.textContent = '● loading...'; document.body.appendChild(el); }
}
function hideLoading() { _loadCount = Math.max(0, _loadCount - 1); if (_loadCount === 0) { const el = document.getElementById('pb-loading'); if (el) el.remove(); } }
function run(fn) {
  showLoading();

// ─── API SUPABASE ─────────────────────────────────────────────────────────────
const OWNER_EMAIL = 'vearathenicofrance@gmail.com';
const PAGE_SIZE = 20;

async function apiLogin(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return { success: false, error: error.message };
  const { data: profile } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
  if (profile?.banned) { await sb.auth.signOut(); return { success: false, error: 'Compte banni' }; }
  S.user = data.user; S.profile = profile;
  if (data.user.email === OWNER_EMAIL && profile?.role !== 'admin') {
    await sb.from('profiles').update({ role: 'admin', rank: 'admin', badge: '[Admin]', color: '#ff2222', premium: true }).eq('id', data.user.id);
    S.profile = { ...profile, role: 'admin', rank: 'admin', badge: '[Admin]', color: '#ff2222', premium: true };
  }
  return { success: true };
}

async function apiRegister(username, email, password) {
  if (!username || username.length < 3) return { success: false, error: 'Username min 3 caractères' };
  if (!/^[a-zA-Z0-9_]+$/.test(username)) return { success: false, error: 'Username: lettres, chiffres, _ seulement' };
  if (!password || password.length < 6) return { success: false, error: 'Mot de passe min 6 caractères' };
  const { data: existing } = await sb.from('profiles').select('id').eq('username', username).single();
  if (existing) return { success: false, error: 'Username déjà pris' };
  const { data, error } = await sb.auth.signUp({ email, password, options: { data: { username } } });
  if (error) return { success: false, error: error.message };
  S.user = data.user;
  await new Promise(r => setTimeout(r, 800));
  const { data: profile } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
  S.profile = profile;
  return { success: true };
}

async function apiLogout() {
  await sb.auth.signOut();
  S.user = null; S.profile = null;
}

async function apiGetPastes(page = 1, search = '') {
  let q = sb.from('pastes').select('*, profiles!pastes_author_fkey(username, color, badge, rank, particle)', { count: 'exact' })
    .eq('visibility', 'public').order('pinned', { ascending: false }).order('created_at', { ascending: false })
    .range((page - 1) * PAGE_SIZE, page * PAGE_SIZE - 1);
  if (search) q = q.ilike('title', `%${search}%`);
  const { data, count, error } = await q;
  if (error) { console.warn(error); return { pastes: [], total: 0, pages: 1 }; }
  const pastes = (data || []).map(p => ({
    id: p.id, link: p.link, title: p.title, content: p.content,
    views: p.views || 0, pinned: p.pinned || false, visibility: p.visibility,
    created_at: p.created_at, author_id: p.author,
    username: p.profiles?.username || null, color: p.profiles?.color || '#2A9FD6',
    badge: p.profiles?.badge || '', rank: p.profiles?.rank || 'user',
    particle: p.profiles?.particle || 'none', comment_count: 0, liked_by: []
  }));
  const total = count || 0;
  return { pastes, total, pages: Math.ceil(total / PAGE_SIZE) || 1 };
}

async function apiGetPaste(link) {
  const { data: p, error } = await sb.from('pastes')
    .select('*, profiles!pastes_author_fkey(username, color, badge, rank, premium, bar_color, particle, avatar_url)')
    .eq('link', link).single();
  if (error || !p) return null;
  await sb.from('pastes').update({ views: (p.views || 0) + 1 }).eq('id', p.id);
  const { data: comments } = await sb.from('comments')
    .select('*, profiles!comments_author_fkey(username, color, badge, rank)').eq('paste', p.id).order('created_at');
  const { data: likes } = await sb.from('likes').select('user').eq('paste', p.id);
  const au = p.profiles;
  return {
    id: p.id, link: p.link, title: p.title, content: p.content,
    views: (p.views || 0) + 1, pinned: p.pinned, visibility: p.visibility,
    created_at: p.created_at, author_id: p.author,
    username: au?.username || null, color: au?.color || '#2A9FD6',
    badge: au?.badge || '', rank: au?.rank || 'user', premium: au?.premium || false,
    bar_color: au?.bar_color || '', particle: au?.particle || 'none', avatar_url: au?.avatar_url || '',
    comments: (comments || []).map(c => {
      const cu = c.profiles;
      return { id: c.id, paste_id: p.id, content: c.content, created_at: c.created_at,
        username: cu?.username || 'Anonymous', color: cu?.color || '#777',
        badge: cu?.badge || '', rank: cu?.rank || 'user', author_id: c.author };
    }),
    liked_by: (likes || []).map(l => l.user)
  };
}

async function apiGetUser(username) {
  const { data: u, error } = await sb.from('profiles').select('*').eq('username', username).single();
  if (error || !u) return null;
  const { data: pastes } = await sb.from('pastes').select('id, title, link, views, visibility, created_at')
    .eq('author', u.id).neq('visibility', 'private').order('created_at', { ascending: false });
  const { count: followers } = await sb.from('profiles').select('id', { count: 'exact' }).contains('following', [u.id]);
  const pasteIds = (pastes || []).map(p => p.id);
  let likes_received = 0;
  if (pasteIds.length) {
    const { count } = await sb.from('likes').select('id', { count: 'exact' }).in('paste', pasteIds);
    likes_received = count || 0;
  }
  return { ...u, pastes: pastes || [], followers: followers || 0, following: (u.following || []).length, likes_received };
}

async function apiGetAllUsers(search = '') {
  let q = sb.from('profiles').select('id, username, rank, color, badge, premium, banned, created_at, particle').order('created_at', { ascending: false });
  if (search) q = q.ilike('username', `%${search}%`);
  const { data } = await q;
  return data || [];
}

async function apiCreatePaste(title, content, visibility) {
  if (!title || !content) return { success: false, error: 'Titre et contenu requis' };
  if (!S.user) return { success: false, error: 'Connexion requise' };
  const slug = (title.replace(/[^a-zA-Z0-9]/g, '') || 'paste').substring(0, 25);
  const link = slug + '_' + Date.now().toString(36);
  const { error } = await sb.from('pastes').insert({ title, content, link, visibility, author: S.user.id, views: 0, pinned: false });
  if (error) return { success: false, error: error.message };
  return { success: true, link };
}

async function apiAddComment(pasteId, content) {
  if (!content?.trim()) return { success: false, error: 'Commentaire vide' };
  if (!S.user) return { success: false, error: 'Connexion requise' };
  const { error } = await sb.from('comments').insert({ paste: pasteId, author: S.user.id, content: content.trim() });
  if (error) return { success: false, error: error.message };
  return { success: true };
}

async function apiDeleteComment(id) {
  const { error } = await sb.from('comments').delete().eq('id', id);
  return !error;
}

async function apiToggleLike(pasteId) {
  if (!S.user) return;
  const { data } = await sb.from('likes').select('id').eq('paste', pasteId).eq('user', S.user.id).single();
  if (data) { await sb.from('likes').delete().eq('id', data.id); }
  else { await sb.from('likes').insert({ paste: pasteId, user: S.user.id }); }
}

async function apiFollow(targetId) {
  if (!S.user || !S.profile) return false;
  const following = [...(S.profile.following || [])];
  const idx = following.indexOf(targetId);
  if (idx === -1) following.push(targetId); else following.splice(idx, 1);
  await sb.from('profiles').update({ following }).eq('id', S.user.id);
  S.profile.following = following;
  return idx === -1;
}

async function apiUpdateProfile(body) {
  if (!S.user) return false;
  const { error } = await sb.from('profiles').update(body).eq('id', S.user.id);
  if (!error) S.profile = { ...S.profile, ...body };
  return !error;
}

async function apiAdminStats() {
  const [users, pastes, comments, banned] = await Promise.all([
    sb.from('profiles').select('id', { count: 'exact' }),
    sb.from('pastes').select('id', { count: 'exact' }),
    sb.from('comments').select('id', { count: 'exact' }),
    sb.from('profiles').select('id', { count: 'exact' }).eq('banned', true),
  ]);
  const { data: viewData } = await sb.from('pastes').select('views');
  const views = (viewData || []).reduce((s, p) => s + (p.views || 0), 0);
  return { users: users.count || 0, pastes: pastes.count || 0, comments: comments.count || 0, banned: banned.count || 0, views };
}

async function apiAdminUsers(search = '') {
  let q = sb.from('profiles').select('*').order('created_at', { ascending: false });
  if (search) q = q.ilike('username', `%${search}%`);
  const { data } = await q;
  return data || [];
}

async function apiAdminPastes(search = '') {
  let q = sb.from('pastes').select('*, profiles!pastes_author_fkey(username)').order('created_at', { ascending: false });
  if (search) q = q.ilike('title', `%${search}%`);
  const { data } = await q;
  return (data || []).map(p => ({ ...p, username: p.profiles?.username || null }));
}

async function apiUpdateUser(id, body) {
  const { error } = await sb.from('profiles').update(body).eq('id', id);
  return !error;
}

async function apiDeleteUser(id) {
  await sb.from('profiles').delete().eq('id', id);
}

async function apiDeletePaste(id) {
  await sb.from('pastes').delete().eq('id', id);
}

async function apiTogglePin(id) {
  const { data } = await sb.from('pastes').select('pinned').eq('id', id).single();
  const pinned = !data?.pinned;
  await sb.from('pastes').update({ pinned }).eq('id', id);
  return pinned;
}

async function apiGrantRank(userId, rank) {
  let body = { rank, premium: true };
  if (rank === 'vip') { body.badge = '[VIP]'; body.color = '#cc66ff'; }
  else if (rank === 'criminal') { body.badge = '[Criminal]'; body.color = '#9944cc'; }
  else if (rank === 'rich') { body.badge = '[Rich]'; body.color = '#ffd700'; }
  else if (rank === 'manager') { body.badge = '[Manager]'; body.color = '#ff6644'; }
  else if (rank === 'council') { body.badge = '[Council]'; body.color = '#4488ff'; }
  else if (rank === 'mod') { body.badge = '[Mod]'; body.color = '#00ff41'; }
  else if (rank === 'admin') { body.badge = '[Admin]'; body.color = '#ff2222'; }
  else { body.badge = ''; body.premium = false; }
  const { error } = await sb.from('profiles').update(body).eq('id', userId);
  return !error;
}

function getSettings() { return JSON.parse(localStorage.getItem('doxbin_settings') || '{"site_name":"FRDoxBin","paypal_email":"yourpaypal@email.com","online_count_base":340}'); }
function apiAdminSettings(body) { const cur = getSettings(); Object.assign(cur, body); localStorage.setItem('doxbin_settings', JSON.stringify(cur)); }

// Profile comments (localStorage)
function apiGetProfileComments(uid) { return JSON.parse(localStorage.getItem('doxbin_pc_' + uid) || '[]'); }
function apiAddProfileComment(uid, content) {
  if (!content?.trim() || !S.user) return { success: false, error: 'Erreur' };
  const list = apiGetProfileComments(uid);
  list.push({ id: Date.now(), target_user: uid, author_id: S.user.id, author_username: S.profile?.username || '?', content: content.trim(), created_at: new Date().toISOString() });
  localStorage.setItem('doxbin_pc_' + uid, JSON.stringify(list));
  return { success: true };
}
function apiDeleteProfileComment(uid, id) {
  localStorage.setItem('doxbin_pc_' + uid, JSON.stringify(apiGetProfileComments(uid).filter(c => c.id !== id)));
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = buildApp();
  attachEvents();
  if (S.page === 'profile' && S.viewUser) spawnParticles(S.viewUser.particle);
  else stopAllParticles();
  requestAnimationFrame(attachNameParticles);
}

function buildApp() {
  return `${buildNav()}<div class="page">
    ${S.page === 'home' ? buildHome() : ''}
    ${S.page === 'upload' ? buildUpload() : ''}
    ${S.page === 'view' ? buildView() : ''}
    ${S.page === 'auth' ? buildAuth() : ''}
    ${S.page === 'admin' ? buildAdmin() : ''}
    ${S.page === 'profile' ? buildProfile() : ''}
    ${S.page === 'users' ? buildUsers() : ''}
    ${S.page === 'shop' ? buildShop() : ''}
    ${S.page === 'settings' ? buildSettings() : ''}

}

function buildNav() {
  const isAdmin = S.profile?.role === 'admin';
  const settings = getSettings();
  const base = settings?.online_count_base || 340;
  const cnt = base + Math.floor(Math.sin(Date.now() / 100000) * 20);
  const username = S.profile?.username || '';
  const ucolor = S.profile?.color || '#2A9FD6';
  return `<nav>
    <div class="nav-brand" onclick="navigate('home')">FRDoxBin</div>
    <div class="nav-links">
      <a class="${S.page === 'home' ? 'active' : ''}" onclick="navigate('home')">${t('home')}</a>
      <a class="${S.page === 'upload' ? 'active' : ''}" onclick="navigate('upload')">${t('addpaste')}</a>
      <a class="${S.page === 'users' ? 'active' : ''}" onclick="run(async()=>{S.allUsers=await apiGetAllUsers();navigate('users');})">${t('users')}</a>
      <a class="${S.page === 'shop' ? 'active' : ''}" onclick="navigate('shop')">${t('upgrades')}</a>
      <a href="https://discord.gg/bsACPp65BA" target="_blank">${t('contact')}</a>
      ${isAdmin ? `<a class="${S.page === 'admin' ? 'active' : ''}" onclick="goAdmin()" style="color:#ff5555">${t('admin')}</a>` : ''}
    </div>
    <div class="nav-right">
      <div class="online-dot">${cnt}</div>
      <span style="color:var(--text3);font-size:12px;cursor:pointer;font-family:monospace;padding:3px 7px;border:1px solid var(--border2)" onclick="setLang(CL==='en'?'fr':'en')">${CL === 'en' ? 'FR' : 'EN'}</span>
      ${S.user
        ? `<span style="color:${ucolor};font-size:13px;cursor:pointer;font-weight:700" onclick="viewUserProfile('${esc(username)}')">${esc(username)}</span><a onclick="navigate('settings')">${t('settings')}</a><a onclick="doLogout()">${t('logout')}</a>`
        : `<a onclick="navigate('auth')">${t('login')}</a><a onclick="navigate('auth')">${t('register')}</a>`}
    </div>
  </nav>`;
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function buildHome() {
  const pinned = S.pastes.filter(p => p.pinned), regular = S.pastes.filter(p => !p.pinned);
  const row = p => {
    const nc = p.color || rankColor(p.rank);
    const anim = p.particle && p.particle !== 'none' ? p.particle : rankAnim(p.rank);
    const au = p.username
      ? `<span class="user-link" data-particle="${anim}" style="color:${nc};font-weight:700;position:relative;display:inline-block" onclick="viewUserProfile('${esc(p.username)}')">${esc(p.username)}${p.badge ? ` <span style="font-size:11px;opacity:.8">${esc(p.badge)}</span>` : ''}</span>`
      : '<span style="color:#444">Anonymous</span>';
    return `<tr><td><span class="paste-link" onclick="viewPaste('${esc(p.link)}')">${esc(p.title)}</span></td><td>${p.views}</td><td>${au}</td><td>${timeAgo(p.created_at)}</td></tr>`;
  };
  const pages = () => {
    let h = `<button onclick="changePage(Math.max(1,${S.currentPage}-1))">&lt;</button>`;
    for (let i = Math.max(1, S.currentPage - 2); i <= Math.min(S.pages, S.currentPage + 2); i++)
      h += `<button class="${i === S.currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
    h += `<button onclick="changePage(Math.min(${S.pages},${S.currentPage}+1))">&gt;</button>`;
    return h;
  };
  return `
  <div class="search-area">
    <span class="search-label">Search for a paste</span>
    <div class="search-row">
      <input class="search-input" id="searchBox" type="text" placeholder="Search..." value="${esc(S.search)}">
      <button class="search-btn" onclick="doSearch()">Search</button>
    </div>
  </div>
  <div class="showing">Showing ${S.pastes.length} of ${S.total} pastes</div>
  <div class="pagination">${pages()}</div>
  <div class="container">
    ${pinned.length ? `<div class="section"><h2 style="font-size:12px;font-weight:700;margin-bottom:8px;color:#fff;letter-spacing:1px;text-transform:uppercase">Pinned</h2><table class="pinned-table"><thead><tr><th>Title</th><th>Views</th><th>Author</th><th>Added</th></tr></thead><tbody>${pinned.map(row).join('')}</tbody></table></div>` : ''}
    <div class="section">
      <table class="main-table">
        <thead><tr><th>Title</th><th>Views</th><th>Author</th><th>Added</th></tr></thead>
        <tbody>${regular.length ? regular.map(row).join('') : '<tr><td colspan="4" style="text-align:center;color:#333;padding:30px;font-family:monospace">No pastes found</td></tr>'}</tbody>
      </table>
    </div>
  </div>
  <div class="pagination">${pages()}</div>
  <div class="showing" style="margin-bottom:20px">Showing ${S.pastes.length} of ${S.total} pastes</div>
  <div class="footer">FRDoxBin &mdash; 2026 &mdash; Please note that all posted information is publicly available</div>`;
}

      </div>` : ''}
      ${isMyPaste && p.premium ? `
      <div style="padding:14px 16px;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Bar Color</div>

// ── AUTH ──────────────────────────────────────────────────────────────────────
function buildAuth() {
  return `<div class="auth-page"><div class="auth-box">
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Login</div>

// ── PROFILE ───────────────────────────────────────────────────────────────────
function buildProfile() {
  const u = S.viewUser;
  if (!u) return '<div style="padding:40px 20px;color:#333;font-family:monospace">User not found.</div>';
  const isMe = S.user?.id === u.id;
  const amIFollowing = (S.profile?.following || []).includes(u.id);
  const nc = u.color || rankColor(u.rank);
  const rl = rankLabel(u.rank);
  const anim = u.particle && u.particle !== 'none' ? u.particle : rankAnim(u.rank);
  const av = u.avatar_url
    ? `<img src="${esc(u.avatar_url)}" style="width:100%;height:100%;object-fit:cover" alt="">`
    : `<span style="color:${nc};font-size:32px;font-weight:700">${esc(u.username[0].toUpperCase())}</span>`;
  const profileComments = apiGetProfileComments(u.id).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  const pcRows = profileComments.map(c => {
    const canDelC = S.profile?.role === 'admin' || S.user?.id === c.author_id || S.user?.id === u.id;
    return `<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:8px 14px;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        <span style="color:#2A9FD6;font-weight:700;cursor:pointer;font-size:13px" onclick="viewUserProfile('${esc(c.author_username||'')}')">${esc(c.author_username || '?')}</span><span style="color:var(--text3);font-size:13px">: ${esc(c.content)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:12px">
        <span style="color:var(--text3);font-size:11px;font-family:monospace">${timeAgo(c.created_at)}</span>
        ${canDelC ? `<span style="color:var(--accent);font-size:11px;cursor:pointer;font-family:monospace" onclick="delProfileComment('${u.id}',${c.id})">del</span>` : ''}
      </div>
    </div>`;
  }).join('');
  const pasteRows = (u.pastes || []).map(p => `
    <tr><td><span class="paste-link" onclick="viewPaste('${esc(p.link)}')">${esc(p.title)}</span></td><td>${p.views}</td><td style="font-family:monospace;font-size:12px">${new Date(p.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</td></tr>`).join('');
  return `
  <div class="profile-page">
    <canvas id="profile-canvas"></canvas>
    <div class="profile-inner" style="max-width:820px;margin:0 auto;padding:24px 16px">
      <div style="background:rgba(14,14,14,.92);border:1px solid var(--border2);margin-bottom:12px">
        <div style="padding:20px;display:flex;align-items:center;gap:18px">
          <div style="width:72px;height:72px;flex-shrink:0;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;background:var(--bg3);overflow:hidden">${av}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
              <span data-particle="${anim}" style="color:${nc};font-size:18px;font-weight:700;position:relative;display:inline-block">${esc(u.username)}</span>
              ${rl ? `<span style="font-size:13px;color:${nc};font-weight:700">${rl}</span>` : ''}
              ${u.bio ? `<span style="color:var(--text3);font-size:13px">&nbsp;|&nbsp;${esc(u.bio)}</span>` : ''}
            </div>
            <div style="display:flex;gap:20px;font-size:13px">
              <span><strong style="color:#fff">${u.following || 0}</strong> <span style="color:var(--text2)">${t('following')}</span></span>
              <span><strong style="color:#fff">${u.followers || 0}</strong> <span style="color:var(--text2)">${t('followers')}</span></span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            ${!isMe && S.user ? `<button class="btn btn-sm ${amIFollowing ? 'btn-red' : ''}" onclick="doFollow('${u.id}')">${amIFollowing ? t('unfollow') : t('follow')}</button>` : ''}
            ${isMe ? `<button class="btn btn-sm" onclick="navigate('settings')">${t('edit_profile')}</button>` : ''}
          </div>
        </div>
        <div style="padding:0 20px 16px;display:flex;gap:8px;flex-wrap:wrap">
          ${u.discord ? `<a href="https://discord.com/users/${esc(u.discord)}" target="_blank" class="social-link">Dsc ${esc(u.discord)}</a>` : ''}
          ${u.twitter ? `<a href="https://x.com/${esc(u.twitter.replace('@',''))}" target="_blank" class="social-link">X ${esc(u.twitter)}</a>` : ''}
          ${u.instagram ? `<a href="https://instagram.com/${esc(u.instagram.replace('@',''))}" target="_blank" class="social-link">Ig ${esc(u.instagram)}</a>` : ''}
          ${u.github ? `<a href="https://github.com/${esc(u.github.replace('@',''))}" target="_blank" class="social-link">Gh ${esc(u.github)}</a>` : ''}
          ${u.website ? `<a href="${esc(u.website)}" target="_blank" class="social-link">Web</a>` : ''}
        </div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border2);margin-bottom:12px">
        <div style="padding:10px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;color:#fff">Info</div>
        ${[['UID', u.id],[t('pastes'), (u.pastes||[]).length],['Likes', u.likes_received||0],['Joined', new Date(u.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})]].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text2)">${k}</span><span style="color:#ccc;font-family:monospace">${v}</span></div>`).join('')}
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border2);margin-bottom:12px">
        <div style="padding:10px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;color:#fff">${t('pastes')}</div>
        ${pasteRows ? `<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr><th style="padding:6px 16px;text-align:left;color:var(--text2);font-size:11px;border-bottom:1px solid var(--border2)">Title</th><th style="padding:6px 16px;text-align:center;color:var(--text2);font-size:11px;border-bottom:1px solid var(--border2)">Views</th><th style="padding:6px 16px;text-align:center;color:var(--text2);font-size:11px;border-bottom:1px solid var(--border2)">Date</th></tr></thead><tbody>${pasteRows}</tbody></table>` : `<div style="padding:20px;text-align:center;color:var(--text3);font-family:monospace;font-size:13px">No pastes yet.</div>`}
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border2)">
        <div style="padding:10px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;color:#fff">Comments (${profileComments.length})</div>
        ${pcRows || `<div style="padding:16px;color:var(--text3);font-size:13px;font-family:monospace;text-align:center">No comments yet.</div>`}
        ${S.user && !isMe ? `
          <div style="padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px">
            <input type="text" id="profileCommentText" placeholder="Leave a comment..." style="flex:1;height:32px;padding:5px 10px">
            <button class="btn btn-sm btn-primary" onclick="submitProfileComment('${u.id}')">Post</button>
          </div>` : (S.user && isMe ? '' : `<div style="padding:10px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)"><a onclick="navigate('auth')" style="cursor:pointer;color:var(--blue)">Login</a> to comment</div>`)}
      </div>
    </div>
  </div>`;
}

// ── USERS ─────────────────────────────────────────────────────────────────────
function buildUsers() {
  const all = S.allUsers || [], sv = S.userSearch || '';
  const filtered = sv ? all.filter(u => u.username.toLowerCase().includes(sv.toLowerCase())) : all;
  const GROUPS = [
    {key:'admin',label:t('admin_lbl')},{key:'manager',label:t('manager_lbl')},{key:'mod',label:t('mod_lbl')},
    {key:'council',label:t('council_lbl')},{key:'rich',label:t('rich_lbl')},{key:'criminal',label:t('criminal_lbl')},
    {key:'vip',label:t('vip_lbl')},{key:'user',label:t('user_lbl')},
  ];
  const row = u => {
    const nc = u.color || rankColor(u.rank);
    const anim = u.particle && u.particle !== 'none' ? u.particle : rankAnim(u.rank);
    return `<tr><td style="color:var(--text3);font-family:monospace;font-size:12px">${esc(String(u.id||'').substring(0,8))}...</td><td><span class="user-link" data-particle="${anim}" style="color:${nc};font-weight:700;position:relative;display:inline-block" onclick="viewUserProfile('${esc(u.username)}')">${esc(u.username)}</span></td><td style="font-family:monospace;font-size:12px;color:var(--text2)">${u.created_at ? new Date(u.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'}</td></tr>`;
  };
  const sections = GROUPS.map(g => {
    const members = filtered.filter(u => u.rank === g.key || (!u.rank && g.key === 'user'));
    if (!members.length) return '';
    return `<div style="margin-bottom:24px">
      <div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:8px">${g.label}</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr><th style="background:var(--bg3);padding:7px 10px;text-align:left;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border2);font-size:11px">ID</th><th style="background:var(--bg3);padding:7px 10px;text-align:left;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border2);font-size:11px">Username</th><th style="background:var(--bg3);padding:7px 10px;text-align:left;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border2);font-size:11px">Joined</th></tr></thead>
        <tbody>${members.map(row).join('')}</tbody>
      </table>
    </div>`;
  }).join('');
  return `<div class="container" style="max-width:900px">
    <h2 style="font-size:20px;font-weight:700;margin-top:24px;margin-bottom:12px;color:#fff;text-align:center">${t('users')}</h2>
    <div style="display:flex;justify-content:center;gap:6px;margin-bottom:20px">
      <input type="text" placeholder="Search..." value="${esc(sv)}" oninput="S.userSearch=this.value;render()" style="width:320px;height:34px">
      <button class="btn" onclick="S.userSearch='';render()">&#215;</button>
    </div>
    ${sections || '<p style="color:#444;text-align:center;font-family:monospace;padding:40px">No users found.</p>'}
  </div>`;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────

  return `<div class="container" style="max-width:600px"><div style="padding:24px 0">

      <div style="display:flex;align-items:flex-start;gap:14px">
        <div class="avatar-preview" id="avatarPreview" onclick="${u.premium ? "document.getElementById('avatarFileInput').click()" : ''}">
          ${u.avatar_url ? `<img id="avatarPreviewImg" src="${esc(u.avatar_url)}" alt="">` : `<span style="font-size:24px;font-weight:700;color:#fff">${esc((u.username || '?')[0].toUpperCase())}</span>`}
        </div>
        <div>
          <input type="file" id="avatarFileInput" accept="image/png,image/jpeg,image/gif,image/webp" ${u.premium ? '' : 'disabled'} onchange="handleAvatarUpload(event)">

        </div>
      </div>
    </div>
    <div class="form-group"><label class="form-label">${t('bio')}</label><textarea id="setBio" style="min-height:80px">${esc(u.bio || '')}</textarea></div>
    <div class="form-group"><label class="form-label">Discord</label><input type="text" id="setDiscord" value="${esc(u.discord || '')}"></div>
    <div class="form-group"><label class="form-label">Twitter / X</label><input type="text" id="setTwitter" value="${esc(u.twitter || '')}"></div>
    <div class="form-group"><label class="form-label">Instagram</label><input type="text" id="setInstagram" value="${esc(u.instagram || '')}"></div>
    <div class="form-group"><label class="form-label">GitHub</label><input type="text" id="setGithub" value="${esc(u.github || '')}"></div>
    <div class="form-group"><label class="form-label">Website</label><input type="text" id="setWebsite" value="${esc(u.website || '')}"></div>
    <div class="grid2"><div class="form-group"><label class="form-label">${t('username_color')} ${u.premium ? '' : '<span style="color:#555;font-weight:400">(Premium)</span>'}</label><input type="color" id="setColor" value="${u.color || '#2A9FD6'}" ${u.premium ? '' : 'disabled style="opacity:.4"'}></div></div>
    <div id="settingsMsg" class="success-msg" style="display:none"></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn" onclick="navigate('home')">${t('cancel')}</button>
      <button class="btn btn-primary" onclick="saveSettings()">${t('save')}</button>
      ${!u.premium ? `<button class="btn btn-gold" onclick="navigate('shop')">Get Premium</button>` : ''}
    </div>
  </div></div>`;

// ── SHOP ─────────────────────────────────────────────────────────────────────
const SHOP_ITEMS = [
  {id:'vip',label:'VIP',lc:'#cc66ff',price:30,features:[['Color','Light Purple'],['GIF avatar',true],['Particle effects','Stars / Snow']]},
  {id:'criminal',label:'Criminal',lc:'#9944cc',price:50,features:[['Color','Dark Purple'],['Private pastes',true],['Particle effects','Stars / Fire / Snow']]},
  {id:'rich',label:'Rich',lc:'#ffd700',price:100,features:[['Color','Gold'],['All features',true],['Particle effects','All']]},
  {id:'color',label:'Color',lc:'#fff',price:10,features:[['Custom username color',true]]},
];
function buildShop() {
  const cards = SHOP_ITEMS.map(item => {
    const fr = item.features.map(([l,v]) => `<div class="shop-feat"><span>${esc(l)}</span>${v===true?'<span class="feat-yes">&#10003;</span>':v===false?'<span class="feat-no">&#10007;</span>':`<span class="feat-val">${esc(String(v))}</span>`}</div>`).join('');
    const btnClass = item.id==='rich'?'btn-gold':item.id==='criminal'?'btn-purple':'btn-primary';
    return `<div class="shop-card"><div class="shop-card-title" style="color:${item.lc}">${esc(item.label)}</div><div class="shop-card-price">$${item.price}</div>${fr}<div style="margin-top:auto;padding-top:16px"><button class="btn ${btnClass}" style="width:100%" onclick="openShopModal('${item.id}','${item.label}',${item.price})">Purchase</button></div></div>`;
  }).join('');
  return `<div class="container" style="max-width:1100px"><h2 style="font-size:13px;font-weight:700;margin-top:24px;color:#fff;letter-spacing:1px;text-transform:uppercase">Upgrades</h2><p style="color:#555;font-size:12px;margin-top:6px;margin-bottom:0;font-family:monospace">Purchases processed via PayPal.</p><div class="shop-grid">${cards}</div></div>`;
}
function buildShopModal() {
  const { label, price } = S.shopModal;
  const pe = getSettings().paypal_email || 'yourpaypal@email.com';
  return `<div class="modal-overlay" onclick="closeShopModal(event)"><div class="modal">
    <span class="modal-close" onclick="S.shopModal=null;render()">&#215;</span>
    <h3>Purchase: ${esc(label)}</h3>
    <p style="color:#888;font-size:13px;margin-bottom:16px">Price: <strong style="color:#fff">$${price}</strong></p>
    <ol style="color:#888;font-size:13px;padding-left:20px;line-height:2.2">
      <li>Send <strong style="color:#fff">$${price}</strong> via PayPal to <strong style="color:var(--blue)">${esc(pe)}</strong></li>
      <li>Include your username in the note</li>
      <li>Send transaction ID to admin</li>
    </ol>
    <div style="display:flex;gap:8px;margin-top:16px">
      <a href="https://www.paypal.com/paypalme/${encodeURIComponent(pe.split('@')[0])}/${price}" target="_blank" class="btn btn-primary" style="flex:1;text-align:center;display:block;padding:8px">Open PayPal</a>
      <button class="btn" onclick="S.shopModal=null;render()">Cancel</button>
    </div>
  </div></div>`;
}
function openShopModal(id, label, price) { if (!S.user) { navigate('auth'); return; } S.shopModal = { id, label, price }; render(); }
function closeShopModal(e) { if (e.target.className === 'modal-overlay') { S.shopModal = null; render(); } }

// ── ADMIN ─────────────────────────────────────────────────────────────────────

  return `<h2>Users</h2><div style="margin-bottom:12px"><input type="text" placeholder="Search..." style="width:240px;height:32px" oninput="run(async()=>{S.adminUsers=await apiAdminUsers(this.value);render();})"></div>

function buildAdminPastes() {
  const rows = S.adminPastes.map(p => `<tr>
    <td style="cursor:pointer" onclick="viewPaste('${esc(p.link)}')">${esc(p.title)}</td>
    <td style="color:#888">${p.username||'anon'}</td><td>${p.views}</td><td>${timeAgo(p.created_at)}</td>
    <td style="white-space:nowrap"><button class="btn btn-sm" onclick="togglePin('${p.id}')">${p.pinned?'Unpin':'Pin'}</button><button class="btn btn-sm btn-red" onclick="deletePaste('${p.id}')">Del</button></td>
  </tr>`).join('');
  return `<h2>Pastes</h2><div style="margin-bottom:12px"><input type="text" placeholder="Search..." style="width:240px;height:32px" oninput="run(async()=>{S.adminPastes=await apiAdminPastes(this.value);render();})"></div>
  <table><thead><tr><th>Title</th><th>Author</th><th>Views</th><th>Date</th><th>Actions</th></tr></thead><tbody>${rows || '<tr><td colspan="5" style="text-align:center;color:#555;padding:20px;font-family:monospace">No pastes</td></tr>'}</tbody></table>`;
}
function buildAdminSettings() {
  const s = getSettings();
  return `<h2>Settings</h2><div style="max-width:480px">
    <div class="form-group"><label class="form-label">Site Name</label><input type="text" id="sSiteName" value="${esc(s.site_name||'FRDoxBin')}"></div>
    <div class="form-group"><label class="form-label">PayPal Email</label><input type="text" id="sPaypal" value="${esc(s.paypal_email||'')}"></div>
    <div class="form-group"><label class="form-label">Online Count Base</label><input type="text" id="sOnline" value="${esc(String(s.online_count_base||340))}"></div>
    <button class="btn btn-primary" onclick="saveAdminSettings()">Save</button>
  </div>`;
}

      </select></div>

    <div class="form-group"><label class="form-label">Role</label><select id="editRole"><option value="user" ${u.role==='user'?'selected':''}>user</option><option value="admin" ${u.role==='admin'?'selected':''}>admin</option></select></div>
    <div class="grid2">
      <div class="form-group"><label class="form-label">Username Color</label><input type="color" id="editColor" value="${u.color||'#2A9FD6'}"></div>
      <div class="form-group"><label class="form-label">Row Highlight</label><input type="color" id="editRowColor" value="${u.row_color||'#0d0d0d'}"></div>
    </div>

    <div class="form-group"><label class="form-label">Particle</label><select id="editParticle">
      <option value="none" ${u.particle==='none'?'selected':''}>None</option>
      <option value="stars" ${u.particle==='stars'?'selected':''}>Stars</option>
      <option value="fire" ${u.particle==='fire'?'selected':''}>Fire</option>
      <option value="snow" ${u.particle==='snow'?'selected':''}>Snow</option>

    <div class="form-group"><label class="form-label">Premium</label><select id="editPremium"><option value="0" ${!u.premium?'selected':''}>No</option><option value="1" ${u.premium?'selected':''}>Yes</option></select></div>
    <div class="form-group" style="display:flex;align-items:center;gap:10px"><input type="checkbox" id="editBanned" ${u.banned?'checked':''} style="width:auto"><label class="form-label" style="margin:0">Banned</label></div>
    <div class="modal-footer"><button class="btn" onclick="S.modal=null;render()">Cancel</button><button class="btn btn-primary" onclick="saveUser('${u.id}')">Save</button></div>
  </div></div>`;
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
const PCONF = {
  stars:  { colors:['#ffffff','#ccddff','#aabbff'], size:[1,2], count:55, vx:[-0.3,0.3], vy:[-0.3,0.3], mode:'drift' },
  fire:   { colors:['#ff4400','#ff6600','#ff9900','#ffcc00'], size:[1,2], count:50, vx:[-0.4,0.4], vy:[-2,-0.5], mode:'rise' },
  snow:   { colors:['#cce8ff','#ffffff','#aad4ff'], size:[1,2], count:45, vx:[-0.3,0.3], vy:[0.3,0.9], mode:'fall' },
  matrix: { colors:['#00ff41','#00cc33','#007722'], size:[1,1], count:40, vx:[0,0], vy:[0.8,2], mode:'matrix' },
};
let particleAnim = null, namePixelAnims = [];
function stopAllParticles() { if (particleAnim) { cancelAnimationFrame(particleAnim); particleAnim = null; } namePixelAnims.forEach(a => cancelAnimationFrame(a)); namePixelAnims = []; }
function spawnParticles(type) {
  stopAllParticles();
  const canvas = document.getElementById('profile-canvas');
  if (!canvas || !type || type === 'none') return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth || 800; canvas.height = canvas.offsetHeight || 600;
  const cfg = PCONF[type] || PCONF.stars;
  const ps = [];
  for (let i = 0; i < cfg.count; i++) ps.push(mkDot(cfg, canvas.width, canvas.height, type));
  function mkDot(cfg, w, h, type) {
    const isMat = type === 'matrix';
    return { x: isMat ? Math.floor(Math.random()*(w/8))*8 : Math.random()*w, y: type==='fire'?h+4:Math.random()*h, vx:cfg.vx[0]+(Math.random()*(cfg.vx[1]-cfg.vx[0])), vy:cfg.vy[0]+(Math.random()*(cfg.vy[1]-cfg.vy[0])), color:cfg.colors[Math.floor(Math.random()*cfg.colors.length)], size:cfg.size[0]+Math.floor(Math.random()*(cfg.size[1]-cfg.size[0]+1)), alpha:Math.random()*.8+.2, life:1, decay:Math.random()*.015+.005, char:isMat?String.fromCharCode(0x30A0+Math.floor(Math.random()*96)):null };
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < ps.length; i++) {
      const p = ps[i];
      ctx.globalAlpha = Math.max(0, Math.min(1, type==='fire'?p.life*.8:p.alpha));
      if (p.char) { ctx.fillStyle = p.color; ctx.font = '9px monospace'; ctx.fillText(p.char, p.x, p.y); }
      else { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); }
      p.x += p.vx; p.y += p.vy;
      if (type==='fire') { p.life-=p.decay; if(p.life<=0) ps[i]=mkDot(cfg,canvas.width,canvas.height,type); }
      else if (type==='stars') { p.alpha+=(Math.random()-.5)*.04; p.alpha=Math.max(.1,Math.min(1,p.alpha)); if(p.x<0)p.x=canvas.width; if(p.x>canvas.width)p.x=0; if(p.y<0)p.y=canvas.height; if(p.y>canvas.height)p.y=0; }
      else if (type==='snow') { if(p.y>canvas.height){p.y=-2;p.x=Math.random()*canvas.width;} }
      else if (type==='matrix') { if(p.char&&Math.random()<.04)p.char=String.fromCharCode(0x30A0+Math.floor(Math.random()*96)); if(p.y>canvas.height){p.y=0;p.x=Math.floor(Math.random()*(canvas.width/8))*8;} }
    }
    ctx.globalAlpha = 1;
    particleAnim = requestAnimationFrame(draw);
  }
  draw();
}
function spawnNameParticles(el, type) {
  if (!el || !type || type === 'none') return;
  if (el._pixelCanvas) el._pixelCanvas.remove();
  const cfg = PCONF[type]; if (!cfg) return;
  const c = document.createElement('canvas');
  c.style.cssText = 'position:absolute;top:-8px;left:-4px;pointer-events:none;z-index:10;';
  el.style.position = 'relative'; el.appendChild(c); el._pixelCanvas = c;
  const W = el.offsetWidth + 12, H = el.offsetHeight + 18;
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  const COUNT = Math.min(16, Math.ceil(W / 8));
  const ps = [];
  for (let i = 0; i < COUNT; i++) ps.push({ x:Math.random()*W, y:H-2, vx:(Math.random()-.5)*.6, vy:type==='snow'?(Math.random()*.5+.2):-(Math.random()*1.2+.3), color:cfg.colors[Math.floor(Math.random()*cfg.colors.length)], size:1, alpha:Math.random()*.9+.1, life:Math.random(), decay:Math.random()*.025+.008 });
  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const p of ps) {
      ctx.globalAlpha = Math.max(0, p.alpha); ctx.fillStyle = p.color; ctx.fillRect(Math.round(p.x), Math.round(p.y), 1, 1);
      p.x += p.vx; p.y += p.vy; p.life -= p.decay;
      if (p.life <= 0) { p.x=Math.random()*W; p.y=type==='snow'?-1:H-2; p.life=Math.random()*.8+.2; p.vx=(Math.random()-.5)*.6; p.vy=type==='snow'?(Math.random()*.5+.2):-(Math.random()*1.2+.3); p.color=cfg.colors[Math.floor(Math.random()*cfg.colors.length)]; }
    }
    ctx.globalAlpha = 1;
    const id = requestAnimationFrame(draw); el._pixelRaf = id; namePixelAnims.push(id);
  }
  draw();
}
function attachNameParticles() { document.querySelectorAll('[data-particle]').forEach(el => { const type = el.getAttribute('data-particle'); spawnNameParticles(el, type); }); }

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function attachEvents() {
  const sb2 = document.getElementById('searchBox'); if (sb2) sb2.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  const lp = document.getElementById('loginPass'); if (lp) lp.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  const rp = document.getElementById('regPass'); if (rp) rp.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
}
function loadPastes() { run(async () => { const r = await apiGetPastes(S.currentPage, S.search); S.pastes = r.pastes; S.total = r.total; S.pages = r.pages; render(); }); }
function doSearch() { S.search = document.getElementById('searchBox').value; S.currentPage = 1; loadPastes(); }
function changePage(p) { S.currentPage = p; loadPastes(); }
function viewPaste(link) { run(async () => { const paste = await apiGetPaste(link); S.viewPaste = paste; navigate('view'); }); }
function viewUserProfile(username) { run(async () => { const user = await apiGetUser(username); S.viewUser = user; navigate('profile'); }); }
function submitPaste() {
  run(async () => {
    const title = document.getElementById('pasteTitle').value.trim();
    const content = document.getElementById('pasteContent').value.trim();
    const visibility = document.getElementById('pasteVisibility').value;
    const r = await apiCreatePaste(title, content, visibility);
    if (r.success) { toast('Paste publié!'); const paste = await apiGetPaste(r.link); S.viewPaste = paste; navigate('view'); }
    else { const e = document.getElementById('uploadError'); if (e) { e.textContent = r.error; e.style.display = 'block'; } }
  });
}
function submitComment(pasteId) {
  run(async () => {
    const content = document.getElementById('commentText')?.value;
    const r = await apiAddComment(pasteId, content);
    if (r.success) { toast('Commentaire posté!'); const paste = await apiGetPaste(S.viewPaste.link); S.viewPaste = paste; render(); }
    else toast(r.error, false);
  });
}
function delComment(id) { if (!confirm('Supprimer?')) return; run(async () => { await apiDeleteComment(id); toast('Supprimé.'); const paste = await apiGetPaste(S.viewPaste.link); S.viewPaste = paste; render(); }); }
function submitProfileComment(targetId) {
  run(async () => {
    const v = document.getElementById('profileCommentText')?.value;
    const r = apiAddProfileComment(targetId, v);
    if (r.success) { toast('Commentaire posté!'); const u = await apiGetUser(S.viewUser.username); S.viewUser = u; render(); }
    else toast(r.error || 'Erreur', false);
  });
}
function delProfileComment(targetId, id) { if (!confirm('Supprimer?')) return; apiDeleteProfileComment(targetId, id); toast('Supprimé.'); run(async () => { const u = await apiGetUser(S.viewUser.username); S.viewUser = u; render(); }); }
function doLike(pasteId) { if (!S.user) { navigate('auth'); return; } run(async () => { await apiToggleLike(pasteId); const paste = await apiGetPaste(S.viewPaste.link); S.viewPaste = paste; render(); }); }
function doFollow(targetId) { if (!S.user) { navigate('auth'); return; } run(async () => { const f = await apiFollow(targetId); toast(f ? 'Abonné!' : 'Désabonné.'); const user = await apiGetUser(S.viewUser.username); S.viewUser = user; render(); }); }
function doLogin() {
  run(async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPass').value;
    if (!email || !password) { const e = document.getElementById('loginError'); if (e) { e.textContent = 'Remplissez tous les champs.'; e.style.display = 'block'; } return; }
    const r = await apiLogin(email, password);
    if (r.success) { toast('Bienvenue, ' + (S.profile?.username || '') + '!'); navigate('home'); loadPastes(); }
    else { const e = document.getElementById('loginError'); if (e) { e.textContent = r.error; e.style.display = 'block'; } }
  });
}
function doRegister() {
  run(async () => {
    const username = document.getElementById('regUser').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPass').value;
    const r = await apiRegister(username, email, password);
    if (r.success) { toast('Compte créé!'); navigate('home'); loadPastes(); }
    else { const e = document.getElementById('regError'); if (e) { e.textContent = r.error; e.style.display = 'block'; } }
  });
}
function doLogout() { run(async () => { await apiLogout(); navigate('home'); toast('Déconnecté.'); loadPastes(); }); }
function switchAuthTab(tab) {
  document.getElementById('tab-login').className = 'auth-tab' + (tab === 'login' ? ' active' : '');
  document.getElementById('tab-register').className = 'auth-tab' + (tab === 'register' ? ' active' : '');
  document.getElementById('auth-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('auth-register').style.display = tab === 'register' ? '' : 'none';
}
function goAdmin() { run(async () => { S.adminStats = await apiAdminStats(); S.adminUsers = await apiAdminUsers(); S.adminPastes = await apiAdminPastes(); S.adminTab = 'dashboard'; navigate('admin'); }); }
function switchAdminTab(tab) { S.adminTab = tab; run(async () => { if (tab==='dashboard') S.adminStats=await apiAdminStats(); if (tab==='users') S.adminUsers=await apiAdminUsers(); if (tab==='pastes') S.adminPastes=await apiAdminPastes(); render(); }); }
function openEditUser(id) { S.modal = S.adminUsers.find(u => u.id === id); render(); }
function openGrantRank(id) { const u = S.adminUsers.find(u => u.id === id); if (u) { S.modal = { ...u, type: 'grantRank' }; render(); } }
function closeModal(e) { if (e.target.className === 'modal-overlay') { S.modal = null; render(); } }
function saveUser(id) {
  const body = { role:document.getElementById('editRole').value, color:document.getElementById('editColor').value, badge:document.getElementById('editBadge').value, particle:document.getElementById('editParticle').value, premium:document.getElementById('editPremium').value==='1', banned:document.getElementById('editBanned').checked };
  run(async () => { if (await apiUpdateUser(id, body)) { toast('Mis à jour!'); S.modal = null; S.adminUsers = await apiAdminUsers(); render(); } else toast('Erreur', false); });
}
function doGrantRank(id) {
  const rank = document.getElementById('grantRankSelect').value;
  run(async () => { if (await apiGrantRank(id, rank)) { toast('Rang accordé!'); S.modal = null; S.adminUsers = await apiAdminUsers(); render(); } else toast('Erreur', false); });
}
function deleteUser(id, name) { if (!confirm(`Supprimer "${name}"?`)) return; run(async () => { await apiDeleteUser(id); toast('Supprimé.'); S.adminUsers = await apiAdminUsers(); render(); }); }
function deletePaste(id) { if (!confirm('Supprimer ce paste?')) return; run(async () => { await apiDeletePaste(id); toast('Supprimé.'); S.adminPastes = await apiAdminPastes(); loadPastes(); render(); }); }
function deleteCurrentPaste(id) { if (!confirm('Supprimer ce paste?')) return; run(async () => { await apiDeletePaste(id); toast('Supprimé.'); navigate('home'); loadPastes(); }); }
function togglePin(id) { run(async () => { const p = await apiTogglePin(id); toast(p ? 'Épinglé.' : 'Désépinglé.'); S.adminPastes = await apiAdminPastes(); loadPastes(); render(); }); }
function copyPaste() { if (S.viewPaste) navigator.clipboard.writeText(S.viewPaste.content).then(() => toast('Copié!')); }
function saveBarColor() {
  const v = document.getElementById('barColorPick')?.value;
  if (!v) return;
  run(async () => { if (await apiUpdateProfile({ bar_color: v })) { toast('Couleur mise à jour!'); const paste = await apiGetPaste(S.viewPaste.link); S.viewPaste = paste; render(); } });
}
function handleAvatarUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  if (file.size > 2 * 1024 * 1024) { toast('Image trop grande (max 2 Mo)', false); return; }
  const r = new FileReader();
  r.onload = ev => { S._pendingAvatar = ev.target.result; const prev = document.getElementById('avatarPreview'); if (prev) prev.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover" alt="">`; };
  r.readAsDataURL(file);
}
function clearAvatar() { S._pendingAvatar = ''; const prev = document.getElementById('avatarPreview'); const uname = S.profile?.username || '?'; if (prev) prev.innerHTML = `<span style="font-size:24px;font-weight:700;color:#fff">${esc(uname[0].toUpperCase())}</span>`; }
function saveSettings() {
  const body = { bio:document.getElementById('setBio').value, discord:document.getElementById('setDiscord')?.value||'', twitter:document.getElementById('setTwitter')?.value||'', instagram:document.getElementById('setInstagram')?.value||'', github:document.getElementById('setGithub')?.value||'', website:document.getElementById('setWebsite')?.value||'', color:document.getElementById('setColor')?.value||'#2A9FD6' };
  if (S._pendingAvatar !== undefined) body.avatar_url = S._pendingAvatar;
  S._pendingAvatar = undefined;
  run(async () => { if (await apiUpdateProfile(body)) { const m = document.getElementById('settingsMsg'); if (m) { m.textContent = 'Profil sauvegardé!'; m.style.display = 'block'; setTimeout(() => { m.style.display = 'none'; }, 2500); } toast('Profil mis à jour!'); } });
}
function saveAdminSettings() { apiAdminSettings({ site_name:document.getElementById('sSiteName').value, paypal_email:document.getElementById('sPaypal').value, online_count_base:parseInt(document.getElementById('sOnline').value)||340 }); toast('Sauvegardé!'); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    S.user = session.user;
    const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
    S.profile = profile;
  }
  render();
  loadPastes();
}
init();
</script>
